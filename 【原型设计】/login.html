<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 汽车分期管理平台</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="login-page">
    <div class="login-container">
      <div class="login-card">
        <!-- Logo区域 -->
        <div class="login-logo">
          <div class="login-logo-icon">
            🚗
          </div>
          <div class="login-logo-text">汽车分期管理平台</div>
          <div class="login-logo-sub">专业分期金融服务系统</div>
        </div>
        
        <!-- 登录表单 -->
        <form class="login-form">
          <div class="form-group">
            <label class="form-label">手机号/账号</label>
            <input type="text" class="form-input" placeholder="请输入手机号或账号">
          </div>
          
          <div class="form-group">
            <label class="form-label">密码</label>
            <input type="password" class="form-input" placeholder="请输入密码">
          </div>
          
          <div class="form-group">
            <label class="form-checkbox">
              <input type="checkbox">
              <span>记住登录状态</span>
            </label>
          </div>
          
          <button type="submit" class="btn btn-primary">
            登录
          </button>
        </form>
        
        <!-- 底部链接 -->
        <div style="margin-top: 24px; text-align: center;">
          <a href="#" style="color: var(--primary); font-size: 13px;">忘记密码？</a>
          <span style="margin: 0 8px; color: var(--gray-300);">|</span>
          <a href="#" style="color: var(--primary); font-size: 13px;">联系管理员</a>
        </div>
      </div>
      
      <!-- 底部版权 -->
      <div style="text-align: center; margin-top: 24px; color: rgba(255,255,255,0.5); font-size: 12px;">
        © 2024 汽车分期管理平台 版权所有
      </div>
    </div>
  </div>
</body>
</html>
