<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Mac模拟交易盘</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f1419 0%, #161b22 50%, #0d1117 100%);
            min-height: 100vh;
            color: #c9d1d9;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid #30363d;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; background: linear-gradient(90deg, #58a6ff, #a371f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header .subtitle { color: #8b949e; font-size: 1rem; }
        
        .assets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .asset-card {
            background: rgba(22, 27, 34, 0.8);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #30363d;
            transition: all 0.3s ease;
        }
        .asset-card:hover { transform: translateY(-4px); border-color: #58a6ff; }
        .asset-card .label { color: #8b949e; font-size: 0.9rem; margin-bottom: 8px; text-transform: uppercase; }
        .asset-card .value { font-size: 1.9rem; font-weight: 700; color: #f0f6fc; }
        .asset-card .change { font-size: 0.95rem; margin-top: 6px; font-weight: 600; }
        .positive { color: #3fb950; }
        .negative { color: #f85149; }
        
        .charts-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }
        @media (max-width: 1024px) { .charts-grid { grid-template-columns: 1fr; } }
        
        .chart-card {
            background: rgba(22, 27, 34, 0.8);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #30363d;
        }
        .chart-card h3 { margin-bottom: 16px; font-size: 1.1rem; color: #f0f6fc; }
        
        .section {
            background: rgba(22, 27, 34, 0.8);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #30363d;
        }
        .section h2 { margin-bottom: 20px; font-size: 1.2rem; color: #f0f6fc; }
        
        .quick-trade {
            display: grid;
            grid-template-columns: 2fr 1fr auto auto;
            gap: 12px;
            align-items: end;
        }
        @media (max-width: 768px) { .quick-trade { grid-template-columns: 1fr; } }
        
        select, input {
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: #f0f6fc;
            font-size: 1rem;
            outline: none;
        }
        select:focus, input:focus { border-color: #58a6ff; }
        
        .btn {
            padding: 14px 28px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        .btn-buy { background: linear-gradient(135deg, #238636, #2ea043); color: white; }
        .btn-sell { background: linear-gradient(135deg, #da3633, #f85149); color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary { background: #30363d; color: #f0f6fc; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 12px; text-align: left; border-bottom: 1px solid #21262d; }
        th { color: #8b949e; font-weight: 500; font-size: 0.85rem; }
        td { font-size: 0.95rem; color: #c9d1d9; }
        tr:hover { background: rgba(48, 54, 61, 0.3); }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }
        .toast.show { transform: translateX(0); }
        .toast.success { background: linear-gradient(135deg, #238636, #2ea043); }
        .toast.error { background: linear-gradient(135deg, #da3633, #f85149); }
        .toast.info { background: linear-gradient(135deg, #1f6feb, #58a6ff); }
        
        .price-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .price-up { background: rgba(47, 129, 83, 0.2); color: #3fb950; }
        .price-down { background: rgba(248, 81, 73, 0.2); color: #f85149; }
        
        canvas { max-height: 300px; }
        
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #8b949e;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #3fb950;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .mini-btn {
            padding: 6px 12px;
            font-size: 0.8rem;
        }
        
        .actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Mac模拟交易盘</h1>
            <div class="subtitle">
                <span class="status-indicator"><span class="status-dot"></span> 系统在线</span>
                · 初始资金 ¥1,000,000 · 本地数据自动保存
            </div>
        </div>
        
        <div class="assets-grid">
            <div class="asset-card">
                <div class="label">💰 总资产</div>
                <div class="value" id="totalAssets">--</div>
                <div class="change" id="totalReturn">--</div>
            </div>
            <div class="asset-card">
                <div class="label">💵 可用现金</div>
                <div class="value" id="cash">--</div>
            </div>
            <div class="asset-card">
                <div class="label">📈 持仓市值</div>
                <div class="value" id="marketValue">--</div>
            </div>
            <div class="asset-card">
                <div class="label">📊 浮动盈亏</div>
                <div class="value" id="totalPnl">--</div>
            </div>
        </div>
        
        <div class="charts-grid">
            <div class="chart-card">
                <h3>📈 资金曲线</h3>
                <canvas id="equityChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>📦 持仓分布</h3>
                <canvas id="positionChart"></canvas>
            </div>
        </div>
        
        <div class="section">
            <h2>⚡ 快速交易</h2>
            <div class="quick-trade">
                <select id="stockSelect"><option value="">选择股票...</option></select>
                <input type="number" id="tradeVolume" placeholder="数量 (100的倍数)" min="100" step="100">
                <button class="btn btn-buy" onclick="executeTrade('buy')" id="buyBtn">🟢 买入</button>
                <button class="btn btn-sell" onclick="executeTrade('sell')" id="sellBtn">🔴 卖出</button>
            </div>
        </div>
        
        <div class="section">
            <h2>📋 持仓明细</h2>
            <table>
                <thead><tr><th>股票</th><th>持仓</th><th>成本</th><th>现价</th><th>市值</th><th>盈亏</th><th>操作</th></tr></thead>
                <tbody id="positionsTable"><tr><td colspan="7" style="text-align:center;color:#666;">加载中...</td></tr></tbody>
            </table>
        </div>
        
        <div class="section">
            <h2>📝 最近交易记录</h2>
            <table>
                <thead><tr><th>时间</th><th>股票</th><th>操作</th><th>价格</th><th>数量</th><th>金额</th><th>手续费</th></tr></thead>
                <tbody id="tradesTable"><tr><td colspan="7" style="text-align:center;color:#666;">暂无交易记录</td></tr></tbody>
            </table>
            <div class="actions">
                <button class="btn btn-secondary" onclick="resetAccount()">🔄 重置账户</button>
                <button class="btn btn-secondary" onclick="exportData()">📥 导出数据</button>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>

<script>
// ============ 股票数据 ============
const STOCKS = {
    '600519.SH': { name: '贵州茅台', basePrice: 1680 },
    '300750.SZ': { name: '宁德时代', basePrice: 185 },
    '000002.SZ': { name: '万科A', basePrice: 15.2 },
    '601318.SH': { name: '中国平安', basePrice: 45.8 },
    '000858.SZ': { name: '五粮液', basePrice: 145 },
    '002415.SZ': { name: '海康威视', basePrice: 32.6 },
    '002594.SZ': { name: '比亚迪', basePrice: 220 },
    '000333.SZ': { name: '美的集团', basePrice: 58 },
    '002714.SZ': { name: '牧原股份', basePrice: 42 },
    '600036.SH': { name: '招商银行', basePrice: 35 },
    '601012.SH': { name: '隆基绿能', basePrice: 22 },
    '000568.SZ': { name: '泸州老窖', basePrice: 168 },
    '002352.SZ': { name: '顺丰控股', basePrice: 52 },
    '601888.SH': { name: '中国中免', basePrice: 85 },
    '000001.SZ': { name: '平安银行', basePrice: 10.5 },
    '600276.SH': { name: '恒瑞医药', basePrice: 48 },
    '000063.SZ': { name: '中兴通讯', basePrice: 28 },
    '601398.SH': { name: '工商银行', basePrice: 5.2 },
    '601288.SH': { name: '农业银行', basePrice: 4.3 },
    '600028.SH': { name: '中国石化', basePrice: 6.1 },
};

// ============ 交易引擎 ============
const TradingEngine = {
    initialCapital: 1000000,
    commissionRate: 0.0003,
    minCommission: 5,
    taxRate: 0.001,
    
    loadData() {
        const saved = localStorage.getItem('trading_account');
        if (saved) {
            const data = JSON.parse(saved);
            this.cash = data.cash;
            this.positions = data.positions || {};
            this.trades = data.trades || [];
            this.equityHistory = data.equityHistory || this.generateDefaultHistory();
        } else {
            this.reset();
        }
    },
    
    saveData() {
        localStorage.setItem('trading_account', JSON.stringify({
            cash: this.cash,
            positions: this.positions,
            trades: this.trades,
            equityHistory: this.equityHistory,
            updatedAt: new Date().toISOString()
        }));
    },
    
    reset() {
        this.cash = this.initialCapital;
        this.positions = {};
        this.trades = [];
        this.equityHistory = this.generateDefaultHistory();
        this.saveData();
    },
    
    generateDefaultHistory() {
        const history = [];
        let equity = this.initialCapital;
        for (let i = 30; i >= 0; i--) {
            const date = new Date();
            date.setDate(date.getDate() - i);
            equity = equity * (1 + (Math.random() - 0.45) * 0.015);
            history.push({
                date: date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }),
                equity: Math.round(equity * 100) / 100
            });
        }
        return history;
    },
    
    getCurrentPrice(tsCode) {
        const stock = STOCKS[tsCode];
        if (!stock) return 50;
        const change = (Math.random() - 0.5) * 0.01; // ±0.5%
        return Math.round(stock.basePrice * (1 + change) * 100) / 100;
    },
    
    calculateFees(amount, action) {
        const commission = Math.max(amount * this.commissionRate, this.minCommission);
        const tax = action === 'SELL' ? amount * this.taxRate : 0;
        return Math.round((commission + tax) * 100) / 100;
    },
    
    buy(tsCode, volume) {
        if (volume < 100 || volume % 100 !== 0) {
            return { success: false, error: '数量必须是100的整数倍' };
        }
        
        const price = this.getCurrentPrice(tsCode);
        const amount = price * volume;
        const fee = this.calculateFees(amount, 'BUY');
        const totalCost = amount + fee;
        
        if (totalCost > this.cash) {
            return { success: false, error: `资金不足 (需要¥${totalCost.toFixed(2)}, 可用¥${this.cash.toFixed(2)})` };
        }
        
        this.cash -= totalCost;
        const stock = STOCKS[tsCode];
        
        if (this.positions[tsCode]) {
            const pos = this.positions[tsCode];
            const totalVol = pos.volume + volume;
            const totalCostBasis = pos.avgCost * pos.volume + price * volume;
            pos.avgCost = Math.round(totalCostBasis / totalVol * 100) / 100;
            pos.volume = totalVol;
        } else {
            this.positions[tsCode] = {
                tsCode, name: stock.name, volume,
                avgCost: price, openDate: new Date().toISOString().split('T')[0]
            };
        }
        
        this.trades.push({
            tradeId: `T${Date.now()}`,
            tsCode, name: stock.name, action: 'BUY',
            price, volume, amount, fee,
            timestamp: new Date().toISOString()
        });
        
        this.updateEquityHistory();
        this.saveData();
        
        return { success: true, remainingCash: this.cash };
    },
    
    sell(tsCode, volume) {
        if (!this.positions[tsCode]) {
            return { success: false, error: `未持有 ${tsCode}` };
        }
        
        const pos = this.positions[tsCode];
        const sellVolume = Math.min(volume, pos.volume);
        
        if (sellVolume < 100) {
            return { success: false, error: '卖出数量至少100股' };
        }
        
        const price = this.getCurrentPrice(tsCode);
        const amount = price * sellVolume;
        const fee = this.calculateFees(amount, 'SELL');
        const netAmount = amount - fee;
        
        const costBasis = pos.avgCost * sellVolume;
        const pnl = amount - costBasis - fee;
        const pnlPct = (pnl / costBasis) * 100;
        
        this.cash += netAmount;
        pos.volume -= sellVolume;
        
        if (pos.volume === 0) {
            delete this.positions[tsCode];
        }
        
        this.trades.push({
            tradeId: `T${Date.now()}`,
            tsCode, name: pos.name, action: 'SELL',
            price, volume: sellVolume, amount, fee,
            pnl: Math.round(pnl * 100) / 100,
            timestamp: new Date().toISOString()
        });
        
        this.updateEquityHistory();
        this.saveData();
        
        return { success: true, pnl, pnlPct, remainingCash: this.cash };
    },
    
    updateEquityHistory() {
        const today = new Date().toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
        const lastEntry = this.equityHistory[this.equityHistory.length - 1];
        
        if (lastEntry && lastEntry.date === today) {
            lastEntry.equity = this.getTotalAssets();
        } else {
            this.equityHistory.push({ date: today, equity: this.getTotalAssets() });
            if (this.equityHistory.length > 30) {
                this.equityHistory.shift();
            }
        }
    },
    
    getTotalAssets() {
        let marketValue = 0;
        for (const tsCode in this.positions) {
            const pos = this.positions[tsCode];
            marketValue += this.getCurrentPrice(tsCode) * pos.volume;
        }
        return this.cash + marketValue;
    },
    
    getPortfolio() {
        const positions = [];
        let totalPnl = 0;
        
        for (const tsCode in this.positions) {
            const pos = this.positions[tsCode];
            const currentPrice = this.getCurrentPrice(tsCode);
            const marketValue = currentPrice * pos.volume;
            const pnl = (currentPrice - pos.avgCost) * pos.volume;
            const pnlPct = ((currentPrice - pos.avgCost) / pos.avgCost) * 100;
            
            positions.push({
                tsCode, name: pos.name, volume: pos.volume,
                avgCost: pos.avgCost, currentPrice,
                marketValue: Math.round(marketValue * 100) / 100,
                pnl: Math.round(pnl * 100) / 100,
                pnlPct: Math.round(pnlPct * 100) / 100,
                openDate: pos.openDate
            });
            
            totalPnl += pnl;
        }
        
        const totalAssets = this.getTotalAssets();
        
        return {
            initialCapital: this.initialCapital,
            totalAssets: Math.round(totalAssets * 100) / 100,
            cash: Math.round(this.cash * 100) / 100,
            marketValue: Math.round((totalAssets - this.cash) * 100) / 100,
            totalPnl: Math.round(totalPnl * 100) / 100,
            totalReturnPct: Math.round(((totalAssets - this.initialCapital) / this.initialCapital) * 100 * 100) / 100,
            positions,
            trades: [...this.trades].reverse()
        };
    }
};

// ============ UI ============
let equityChart, positionChart;

function init() {
    TradingEngine.loadData();
    
    // 填充股票选择器
    const select = document.getElementById('stockSelect');
    for (const [code, info] of Object.entries(STOCKS)) {
        const option = document.createElement('option');
        option.value = code;
        option.textContent = `${code} ${info.name}`;
        select.appendChild(option);
    }
    
    updateUI();
    setInterval(updateUI, 5000); // 每5秒刷新价格
}

function updateUI() {
    const portfolio = TradingEngine.getPortfolio();
    
    // 资产卡片
    document.getElementById('totalAssets').textContent = formatMoney(portfolio.totalAssets);
    document.getElementById('cash').textContent = formatMoney(portfolio.cash);
    document.getElementById('marketValue').textContent = formatMoney(portfolio.marketValue);
    document.getElementById('totalPnl').textContent = formatMoney(portfolio.totalPnl, true);
    document.getElementById('totalPnl').className = portfolio.totalPnl >= 0 ? 'value positive' : 'value negative';
    
    const returnEl = document.getElementById('totalReturn');
    returnEl.textContent = `${portfolio.totalReturnPct >= 0 ? '+' : ''}${portfolio.totalReturnPct}%`;
    returnEl.className = portfolio.totalReturnPct >= 0 ? 'change positive' : 'change negative';
    
    // 持仓表格
    updatePositionsTable(portfolio.positions);
    
    // 交易记录
    updateTradesTable(portfolio.trades);
    
    // 图表
    updateCharts(portfolio);
}

function updatePositionsTable(positions) {
    const tbody = document.getElementById('positionsTable');
    if (!positions || positions.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#666;">暂无持仓</td></tr>';
        return;
    }
    
    tbody.innerHTML = positions.map(p => `
        <tr>
            <td><strong>${p.name}</strong><br><small style="color:#666;">${p.tsCode}</small></td>
            <td>${p.volume.toLocaleString()}</td>
            <td>¥${p.avgCost.toFixed(2)}</td>
            <td><span class="price-tag ${p.pnl >= 0 ? 'price-up' : 'price-down'}">¥${p.currentPrice.toFixed(2)}</span></td>
            <td>¥${p.marketValue.toLocaleString()}</td>
            <td class="${p.pnl >= 0 ? 'positive' : 'negative'}">${p.pnl >= 0 ? '+' : ''}¥${p.pnl.toLocaleString()}</td>
            <td><button class="btn btn-sell mini-btn" onclick="quickSell('${p.tsCode}', ${p.volume})">卖出</button></td>
        </tr>
    `).join('');
}

function updateTradesTable(trades) {
    const tbody = document.getElementById('tradesTable');
    if (!trades || trades.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#666;">暂无交易记录</td></tr>';
        return;
    }
    
    tbody.innerHTML = trades.slice(0, 10).map(t => {
        const time = new Date(t.timestamp).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        return `
            <tr>
                <td>${time}</td>
                <td>${t.name}</td>
                <td class="${t.action === 'BUY' ? 'positive' : 'negative'}">${t.action === 'BUY' ? '🟢 买入' : '🔴 卖出'}</td>
                <td>¥${t.price.toFixed(2)}</td>
                <td>${t.volume.toLocaleString()}</td>
                <td>¥${t.amount.toLocaleString()}</td>
                <td>¥${t.fee.toFixed(2)}</td>
            </tr>
        `;
    }).join('');
}

function updateCharts(portfolio) {
    // 资金曲线
    const ctx1 = document.getElementById('equityChart').getContext('2d');
    if (equityChart) equityChart.destroy();
    
    const history = TradingEngine.equityHistory;
    
    equityChart = new Chart(ctx1, {
        type: 'line',
        data: {
            labels: history.map(h => h.date),
            datasets: [{
                label: '总资产',
                data: history.map(h => h.equity),
                borderColor: '#3fb950',
                backgroundColor: 'rgba(63, 185, 80, 0.1)',
                fill: true,
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                y: {
                    grid: { color: '#21262d' },
                    ticks: { color: '#8b949e', callback: v => '¥' + (v/10000).toFixed(0) + '万' }
                },
                x: { grid: { display: false }, ticks: { color: '#8b949e', maxTicksLimit: 6 } }
            }
        }
    });
    
    // 持仓分布
    const ctx2 = document.getElementById('positionChart').getContext('2d');
    if (positionChart) positionChart.destroy();
    
    if (portfolio.positions && portfolio.positions.length > 0) {
        positionChart = new Chart(ctx2, {
            type: 'doughnut',
            data: {
                labels: portfolio.positions.map(p => p.name),
                datasets: [{
                    data: portfolio.positions.map(p => p.marketValue),
                    backgroundColor: ['#58a6ff', '#a371f7', '#3fb950', '#f85149', '#d29922', '#f0883e', '#79c0ff', '#ffa657']
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'right', labels: { color: '#c9d1d9' } }
                }
            }
        });
    } else {
        // 空持仓显示占位图
        positionChart = new Chart(ctx2, {
            type: 'doughnut',
            data: {
                labels: ['现金'],
                datasets: [{
                    data: [portfolio.cash],
                    backgroundColor: ['#30363d']
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'right', labels: { color: '#c9d1d9' } }
                }
            }
        });
    }
}

function executeTrade(action) {
    const stock = document.getElementById('stockSelect').value;
    const volume = parseInt(document.getElementById('tradeVolume').value);
    
    if (!stock) {
        showToast('请选择股票', 'error');
        return;
    }
    if (!volume || volume < 100 || volume % 100 !== 0) {
        showToast('请输入有效的数量（100的整数倍）', 'error');
        return;
    }
    
    const btn = document.getElementById(action + 'Btn');
    btn.disabled = true;
    const originalText = btn.textContent;
    btn.textContent = '处理中...';
    
    setTimeout(() => {
        const result = action === 'buy' 
            ? TradingEngine.buy(stock, volume)
            : TradingEngine.sell(stock, volume);
        
        if (result.success) {
            showToast(`${action === 'buy' ? '买入' : '卖出'}成功！`, 'success');
            document.getElementById('tradeVolume').value = '';
            updateUI();
        } else {
            showToast(result.error, 'error');
        }
        
        btn.disabled = false;
        btn.textContent = originalText;
    }, 300);
}

function quickSell(stockCode, maxVolume) {
    document.getElementById('stockSelect').value = stockCode;
    document.getElementById('tradeVolume').value = maxVolume;
    showToast(`已选择 ${STOCKS[stockCode].name}，点击卖出按钮确认`, 'info');
}

function resetAccount() {
    if (confirm('确定要重置账户吗？所有持仓和交易记录将被清空！')) {
        TradingEngine.reset();
        updateUI();
        showToast('账户已重置', 'info');
    }
}

function exportData() {
    const data = localStorage.getItem('trading_account');
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `交易数据_${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('数据已导出', 'success');
}

function formatMoney(value, showSign = false) {
    if (value === undefined || value === null) return '--';
    const sign = showSign && value > 0 ? '+' : '';
    return sign + '¥' + value.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function showToast(message, type = 'info') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = `toast ${type}`;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

// 启动
init();
</script>
</body>
</html>
