<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>我的合同 - 汽车分期管理平台</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div class="page">
        <!-- 顶部导航 -->
        <header class="navbar">
            <h1 class="navbar-title">我的合同</h1>
            <a href="profile.html" class="navbar-avatar" id="userAvatar">客</a>
        </header>
        
        <!-- 贷款总览卡片 -->
        <div class="loan-overview-card" id="loanOverview">
            <div class="loan-amount">
                <span class="amount-large">28</span>
                <span class="amount-unit">万元</span>
            </div>
            <div class="loan-detail">
                <div class="loan-detail-item">
                    <div class="loan-detail-value">8万</div>
                    <div class="loan-detail-label">首付</div>
                </div>
                <div class="loan-detail-item">
                    <div class="loan-detail-value">8,520</div>
                    <div class="loan-detail-label">月供</div>
                </div>
                <div class="loan-detail-item">
                    <div class="loan-detail-value">36期</div>
                    <div class="loan-detail-label">分期</div>
                </div>
            </div>
        </div>
        
        <!-- 还款计划 -->
        <div class="card">
            <div class="card-header">还款计划</div>
            <div class="card-body" style="padding: 0;">
                <table class="table">
                    <thead>
                        <tr>
                            <th>期数</th>
                            <th>应还日期</th>
                            <th>金额</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody id="repaymentList">
                        <!-- 动态渲染 -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- 还款进度 -->
        <div class="card">
            <div class="card-body">
                <div class="repayment-progress-text">
                    <span id="progressText">已还 8 期，剩余 28 期</span>
                    <span style="color: var(--accent);">22.2%</span>
                </div>
                <div class="repayment-progress-bar">
                    <div class="repayment-progress-fill" id="progressBar" style="width: 22.2%;"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 底部导航 -->
    <nav class="bottom-nav">
        <a href="home.html" class="nav-item">
            <div class="nav-icon">📊</div>
            <div class="nav-text">进度查询</div>
        </a>
        <a href="contract.html" class="nav-item active">
            <div class="nav-icon">📄</div>
            <div class="nav-text">我的合同</div>
        </a>
        <a href="documents.html" class="nav-item">
            <div class="nav-icon">📁</div>
            <div class="nav-text">我的资料</div>
        </a>
        <a href="profile.html" class="nav-item">
            <div class="nav-icon">👤</div>
            <div class="nav-text">个人中心</div>
        </a>
    </nav>
    
    <!-- 引入JS -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        // 页面初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 检查登录状态
            if (!initPageAuth()) {
                return;
            }
            
            // 加载还款计划
            loadRepayments();
        });
    </script>
</body>
</html>
