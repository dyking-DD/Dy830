<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>我的资料 - 汽车分期管理平台</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div class="page">
        <!-- 顶部导航 -->
        <header class="navbar">
            <h1 class="navbar-title">我的资料</h1>
            <a href="profile.html" class="navbar-avatar" id="userAvatar">客</a>
        </header>
        
        <!-- 进度圆环 -->
        <div class="card" style="text-align: center;">
            <div class="card-body">
                <div class="progress-ring">
                    <svg width="120" height="120">
                        <circle class="progress-ring-bg" cx="60" cy="60" r="50"></circle>
                        <circle id="progressRing" class="progress-ring-progress" cx="60" cy="60" r="50" 
                                stroke-dasharray="314.16" stroke-dashoffset="94.25"></circle>
                    </svg>
                    <div class="progress-ring-text">
                        <div class="progress-ring-value" id="progressValue">70%</div>
                        <div class="progress-ring-label">已上传</div>
                    </div>
                </div>
                <p style="font-size: 14px; color: var(--text-light); margin-top: 16px;">
                    已上传 <span style="color: var(--accent);">7</span> / 10 项资料
                </p>
            </div>
        </div>
        
        <!-- 资料列表 -->
        <div id="docList">
            <!-- 动态渲染 -->
        </div>
        
        <!-- 温馨提示 -->
        <div class="card">
            <div class="card-body" style="font-size: 13px; color: var(--text-light); line-height: 1.6;">
                <p style="margin-bottom: 8px;"><strong>温馨提示：</strong></p>
                <p>1. 带 <span style="color: var(--danger);">*</span> 的为必填资料</p>
                <p>2. 请确保上传的资料清晰完整</p>
                <p>3. 支持 JPG、PNG、PDF 格式</p>
            </div>
        </div>
    </div>
    
    <!-- 底部导航 -->
    <nav class="bottom-nav">
        <a href="home.html" class="nav-item">
            <div class="nav-icon">📊</div>
            <div class="nav-text">进度查询</div>
        </a>
        <a href="contract.html" class="nav-item">
            <div class="nav-icon">📄</div>
            <div class="nav-text">我的合同</div>
        </a>
        <a href="documents.html" class="nav-item active">
            <div class="nav-icon">📁</div>
            <div class="nav-text">我的资料</div>
        </a>
        <a href="profile.html" class="nav-item">
            <div class="nav-icon">👤</div>
            <div class="nav-text">个人中心</div>
        </a>
    </nav>
    
    <!-- 引入JS -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        // 页面初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 检查登录状态
            if (!initPageAuth()) {
                return;
            }
            
            // 加载资料列表
            loadDocuments();
        });
    </script>
</body>
</html>
