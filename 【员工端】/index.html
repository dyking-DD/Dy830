<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汽车分期 员工端</title>
<style>
:root{--bg:#0f1f3d;--bg2:#1a3a6b;--accent:#D4AF37;--card:#fff;--text:#333;--muted:#888;--err:#ff4757;--ok:#2ed573}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* LOGIN */
.lp{display:flex;align-items:center;justify-content:center;min-height:100vh}
.lc{background:var(--card);border-radius:20px;padding:40px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.lc h2{color:var(--accent);margin-bottom:6px;font-size:20px}
.lc p{color:var(--muted);font-size:12px;margin-bottom:24px}
.lc input{width:100%;padding:13px;border:2px solid #e0e0e0;border-radius:12px;font-size:15px;outline:none;margin-bottom:12px}
.lc input:focus{border-color:var(--accent)}
.lc button{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#b8860b);color:var(--bg);border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
.le{color:var(--err);font-size:13px;margin-top:8px;display:none}

/* MAIN APP */
.app{display:none;min-height:100vh}

/* HEADER */
.hh{background:linear-gradient(135deg,var(--bg),var(--bg2));padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
.hh h1{color:var(--accent);font-size:18px}
.hh-right{display:flex;align-items:center;gap:10px}
.staff-name{color:rgba(255,255,255,.7);font-size:13px}
.lobtn{background:rgba(255,255,255,.15);color:white;border:1px solid rgba(255,255,255,.3);padding:5px 14px;border-radius:20px;cursor:pointer;font-size:12px}

/* TABS */
.tabs{display:flex;gap:4px;padding:10px 16px;background:var(--bg);overflow-x:auto;padding-bottom:0}
.tab{padding:9px 16px;border:none;background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);border-radius:12px 12px 0 0;cursor:pointer;font-size:13px;white-space:nowrap}
.tab.active{background:var(--card);color:var(--bg);font-weight:700}

/* CONTENT */
.content{padding:16px;max-width:900px;margin:0 auto}

/* CARD */
.card{background:var(--card);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.card h3{color:var(--bg);font-size:15px;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--accent)}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.form-group label{font-size:12px;color:var(--muted)}
.form-group input,.form-group select{padding:11px 13px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;outline:none;transition:border-color .2s}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.form-group input[readonly]{background:#f5f5f5}
.submit-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent),#b8860b);color:var(--bg);border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px}
.submit-btn:disabled{opacity:.6;cursor:not-allowed}

/* RATE CARDS */
.rate-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.rate-card{padding:12px;border:2px solid #e0e0e0;border-radius:10px;cursor:pointer;text-align:center;transition:all .2s}
.rate-card.selected{border-color:var(--accent);background:#fffdf0}
.rate-card .r{font-size:18px;font-weight:700;color:var(--bg)}
.rate-card .l{font-size:11px;color:var(--muted);margin-top:2px}

/* RESULT ROWS */
.result-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.result-row:last-child{border:none}
.result-row .v{font-weight:700;color:var(--bg)}
.result-row.accent .v{color:var(--accent);font-size:16px}

/* ORDER LIST */
.order-item{padding:14px;border:1px solid #eee;border-radius:12px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.order-item:hover{border-color:var(--accent);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.oi-top{display:flex;justify-content:space-between;align-items:center}
.oi-name{font-weight:700;color:var(--bg);font-size:15px}
.oi-car{font-size:12px;color:var(--muted);margin-top:4px}
.oi-amount{text-align:right}
.oi-amount .v{font-size:17px;font-weight:700;color:var(--accent)}
.oi-amount .l{font-size:11px;color:var(--muted)}
.oi-meta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.bdg{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px}
.bg-grn{background:#eaf9ee;color:#27ae60}
.bg-yel{background:#fff8e1;color:#f39c12}
.bg-blu{background:#e8f0ff;color:#2980b9}
.bg-red{background:#fff0f0;color:#e74c3c}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat-card{background:var(--card);border-radius:12px;padding:20px;text-align:center;border-top:3px solid var(--accent)}
.stat-card .v{font-size:24px;font-weight:700;color:var(--bg)}
.stat-card .l{font-size:12px;color:var(--muted);margin-top:4px}

/* TOAST */
.toast{position:fixed;top:70px;right:16px;background:var(--ok);color:white;padding:10px 20px;border-radius:8px;font-size:14px;display:none;z-index:300}
.toast.err{background:var(--err)}

/* EMPTY */
.empty{text-align:center;padding:40px 0;color:var(--muted)}

/* SUPPLEMENT INFO */
.sinfo{padding:12px;background:#f5f7ff;border-radius:10px;font-size:13px;margin-bottom:14px}
.sinfo .row{display:flex;justify-content:space-between;padding:4px 0}
.sinfo .k{color:var(--muted)}
.sinfo .v{font-weight:600;color:var(--bg)}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div class="lp" id="loginPage">
  <div class="lc">
    <h2>汽车分期 员工端</h2>
    <p>请输入员工密码登录</p>
    <input type="password" id="pwInput" placeholder="员工密码" onkeydown="if(event.key==='Enter')staffLogin()">
    <button onclick="staffLogin()">登 录</button>
    <div class="le" id="loginError">密码错误，请重试</div>
  </div>
</div>

<!-- MAIN APP -->
<div class="app" id="appPage">
  <div class="hh">
    <h1>🚗 汽车分期</h1>
    <div class="hh-right">
      <span class="staff-name" id="staffDisplay"></span>
      <button class="lobtn" onclick="staffLogout()">退出</button>
    </div>
  </div>
  <div class="tabs" id="tabBar"></div>
  <div class="content" id="mainContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
var API = 'https://fresh-animals-tease.loca.lt';
var STAFF_PASSWORD = '888888';
var STAFF_LIST = [
  {name:'焦建华', code:'DQ003'},
  {name:'邹文丽', code:'DQ005'}
];

var TABS = ['order','my','supplement','stat'];
var TAB_NAMES = {'order':'📝 报单', 'my':'📋 我的订单', 'supplement':'🔄 二次提交', 'stat':'📊 我的业绩'};
var currentTab = 'order';

function staffLogin() {
  var pw = document.getElementById('pwInput').value;
  if (pw !== STAFF_PASSWORD) {
    document.getElementById('loginError').style.display = 'block';
    return;
  }
  localStorage.setItem('sf', '1');
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('appPage').style.display = 'block';
  initApp();
}

function staffLogout() {
  localStorage.removeItem('sf');
  location.reload();
}

if (localStorage.getItem('sf')) {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('appPage').style.display = 'block';
  initApp();
}

function initApp() {
  renderTabs();
  switchTab('order');
}

function renderTabs() {
  var bar = document.getElementById('tabBar');
  bar.innerHTML = TABS.map(function(t) {
    return '<button class="tab' + (t === currentTab ? ' active' : '') + '" onclick="switchTab(\'' + t + '\')">' + TAB_NAMES[t] + '</button>';
  }).join('');
}

function switchTab(name) {
  currentTab = name;
  renderTabs();
  document.getElementById('mainContent').innerHTML = '<div class="empty">加载中...</div>';
  if (name === 'order') renderOrderForm();
  else if (name === 'my') renderMyOrders();
  else if (name === 'supplement') renderSupplement();
  else if (name === 'stat') renderStat();
}

function toast(msg, isErr) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isErr ? ' err' : '');
  t.style.display = 'block';
  setTimeout(function() { t.style.display = 'none'; }, 3500);
}

function getToken() {
  return fetch(API + '/api/v1/auth/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username:'admin', password:'admin123'})
  }).then(function(r) { return r.json(); }).then(function(d) { return d.data ? d.data.token : ''; });
}

// ================================================================
// ORDER FORM TAB
// ================================================================
function renderOrderForm() {
  document.getElementById('mainContent').innerHTML = `
  <div class="card">
    <h3>📝 新建订单报单</h3>
    <div class="form-group">
      <label>报单员工</label>
      <select id="fStaff" onchange="document.getElementById('fStaffName').value=this.options[this.selectedIndex].text">
        <option value="">请选择员工</option>
        ${STAFF_LIST.map(function(s){ return '<option value="'+s.code+'">'+s.name+' ('+s.code+')</option>'; }).join('')}
      </select>
      <input type="hidden" id="fStaffName" value="">
    </div>
    <div class="form-grid">
      <div class="form-group"><label>客户姓名 <span style="color:red">*</span></label><input id="fName" placeholder="客户姓名"></div>
      <div class="form-group"><label>手机号码 <span style="color:red">*</span></label><input id="fPhone" placeholder="11位手机号" maxlength="11"></div>
      <div class="form-group"><label>身份证号</label><input id="fIdNum" placeholder="18位身份证号" maxlength="18"></div>
      <div class="form-group"><label>客户地址</label><input id="fAddr" placeholder="详细地址"></div>
    </div>
    <div style="height:2px;background:#f0f0f0;margin:8px 0 16px"></div>
    <div class="form-grid">
      <div class="form-group"><label>汽车品牌 <span style="color:red">*</span></label><input id="fBrand" placeholder="如：问界"></div>
      <div class="form-group"><label>车型 <span style="color:red">*</span></label><input id="fModel" placeholder="如：M7"></div>
      <div class="form-group"><label>车牌号</label><input id="fPlate" placeholder="陕A12345" value="陕"></div>
      <div class="form-group"><label>车价（元） <span style="color:red">*</span></label><input id="fPrice" type="number" placeholder="如：300000" onchange="calcLoan()"></div>
    </div>
    <div class="form-group">
      <label>首付比例</label>
      <div style="display:flex;gap:10px;margin-top:4px">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px">
          <input type="radio" name="fDownRatio" value="0.15" checked onchange="calcLoan()"> 15% （首付15%，贷款85%）
        </label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px">
          <input type="radio" name="fDownRatio" value="0.20" onchange="calcLoan()"> 20% （首付20%，贷款80%）
        </label>
      </div>
    </div>
    <div class="form-group">
      <label>综合费率（一次性）</label>
      <div class="rate-cards">
        <div class="rate-card selected" onclick="selectRate(this,0.10)">
          <div class="r">10%</div><div class="l">不贴息</div>
        </div>
        <div class="rate-card" onclick="selectRate(this,0.135)">
          <div class="r">13.5%</div><div class="l">半贴息</div>
        </div>
        <div class="rate-card" onclick="selectRate(this,0.15)">
          <div class="r">15%</div><div class="l">全贴息</div>
        </div>
        <div class="rate-card" onclick="selectRate(this,0.1584)">
          <div class="r">15.84%</div><div class="l">优惠费率</div>
        </div>
      </div>
      <input type="hidden" id="fRate" value="0.10">
    </div>
    <div style="background:#f5f7ff;border-radius:12px;padding:16px;margin-bottom:14px">
      <div class="result-row"><span>首付金额</span><span class="v" id="rDown">—</span></div>
      <div class="result-row"><span>贷款金额</span><span class="v" id="rLoan">—</span></div>
      <div class="result-row"><span>合计总利息</span><span class="v" id="rInterest">—</span></div>
      <div class="result-row accent"><span>月供（60期）</span><span class="v" id="rMonthly">—</span></div>
    </div>
    <div class="form-grid">
      <div class="form-group"><label>合作银行</label>
        <select id="fBank">
          <option value="">请选择</option><option>工商银行</option><option>建设银行</option><option>中国银行</option><option>农业银行</option><option>招商银行</option><option>平安银行</option><option>秦农银行</option><option>其他</option>
        </select>
      </div>
      <div class="form-group"><label>还款方式</label>
        <select id="fRepay">
          <option>等额本息</option><option>等额本金</option>
        </select>
      </div>
      <div class="form-group"><label>GPS安装</label>
        <select id="fGps"><option value="是">是</option><option value="否">否</option></select>
      </div>
      <div class="form-group"><label>是否垫资</label>
        <select id="fAdvance"><option value="是">是</option><option value="否">否</option></select>
      </div>
    </div>
    <div class="form-group"><label>备注</label><input id="fRemark" placeholder="其他备注信息"></div>
    <button class="submit-btn" id="fSubmitBtn" onclick="submitOrder()">提 交 订 单</button>
  </div>`;
  window._currentRate = 0.10;
}

function selectRate(el, rate) {
  document.querySelectorAll('.rate-card').forEach(function(c){ c.classList.remove('selected'); });
  el.classList.add('selected');
  window._currentRate = rate;
  document.getElementById('fRate').value = rate;
  calcLoan();
}

function calcLoan() {
  var price = parseFloat(document.getElementById('fPrice').value) || 0;
  var ratio = parseFloat(document.querySelector('input[name="fDownRatio"]:checked').value) || 0.15;
  var rate = window._currentRate || 0.10;
  if (!price) {
    document.getElementById('rDown').textContent = '—';
    document.getElementById('rLoan').textContent = '—';
    document.getElementById('rInterest').textContent = '—';
    document.getElementById('rMonthly').textContent = '—';
    return;
  }
  var down = price * ratio;
  var loan = price * (1 - ratio);
  var totalInterest = loan * rate;
  var monthly = (loan + totalInterest) / 60;
  document.getElementById('rDown').textContent = '¥' + down.toLocaleString();
  document.getElementById('rLoan').textContent = '¥' + loan.toLocaleString();
  document.getElementById('rInterest').textContent = '¥' + totalInterest.toLocaleString();
  document.getElementById('rMonthly').textContent = '¥' + monthly.toLocaleString();
}

function fmt(n) { return n ? Number(n).toLocaleString() : '0'; }

async function submitOrder() {
  var name = document.getElementById('fName').value.trim();
  var phone = document.getElementById('fPhone').value.trim();
  var brand = document.getElementById('fBrand').value.trim();
  var model = document.getElementById('fModel').value.trim();
  var price = parseFloat(document.getElementById('fPrice').value) || 0;
  var staffCode = document.getElementById('fStaff').value;
  var staffName = document.getElementById('fStaffName').value;
  var plate = document.getElementById('fPlate').value.trim();
  var rate = window._currentRate || 0.10;
  var ratio = parseFloat(document.querySelector('input[name="fDownRatio"]:checked').value) || 0.15;

  if (!name || !phone || !brand || !model || !price) { toast('请填写必填项（姓名/手机/品牌/车型/车价）', true); return; }
  if (phone.length !== 11) { toast('手机号需11位', true); return; }

  var down = price * ratio;
  var loan = price * (1 - ratio);
  var totalInterest = loan * rate;
  var monthly = (loan + totalInterest) / 60;
  var gps = document.getElementById('fGps').value;
  var adv = document.getElementById('fAdvance').value;

  var btn = document.getElementById('fSubmitBtn');
  btn.disabled = true; btn.textContent = '提交中...';

  try {
    var token = await getToken();
    var h = {'Content-Type':'application/json', 'Authorization':'Bearer '+token};

    var cid = '';
    var cr = await fetch(API+'/api/v1/customers?phone='+phone, {headers:h}).then(function(r){return r.json();});
    if (cr.data && cr.data.items && cr.data.items.length > 0) {
      cid = cr.data.items[0].customer_id;
    }
    if (!cid) {
      var cr2 = await fetch(API+'/api/v1/customers', {method:'POST', headers:h, body:JSON.stringify({
        name:name, phone:phone, id_number:document.getElementById('fIdNum').value, address:document.getElementById('fAddr').value
      })}).then(function(r){return r.json();});
      if (cr2.data && cr2.data.customer) cid = cr2.data.customer.customer_id;
    }
    if (!cid) { toast('客户创建失败', true); btn.disabled=false; btn.textContent='提 交 订 单'; return; }

    var stageRemark = '员工:'+staffName+'|GPS:'+gps+'|垫资:'+adv+'|总利息:'+totalInterest.toFixed(2)+'|月供:'+monthly.toFixed(2);

    var res = await fetch(API+'/api/v1/orders', {method:'POST', headers:h, body:JSON.stringify({
      customer_id: cid, customer_name: name, customer_phone: phone,
      car_brand: brand, car_model: model, car_price: price,
      plate_number: plate, loan_amount: loan, down_payment: down,
      loan_period: 60, monthly_payment: monthly, interest_rate: rate,
      total_interest: totalInterest, bank_name: document.getElementById('fBank').value,
      repayment_method: document.getElementById('fRepay').value,
      gps_installed: gps === '是', advance_payment: adv === '是',
      created_by: staffCode || '管理员',
      stage: '已提交', stage_remark: stageRemark,
      remarks: document.getElementById('fRemark').value
    })}).then(function(r){return r.json();});

    if (res.code === 200 || res.code === 201) {
      toast('订单提交成功！');
      document.querySelectorAll('#mainContent input, #mainContent select').forEach(function(i){ if(i.type!='radio') i.value=''; });
      document.getElementById('fPlate').value = '陕';
      calcLoan();
      switchTab('my');
    } else {
      toast(res.message || '提交失败', true);
    }
  } catch(e) { toast('提交失败：'+e.message, true); }
  btn.disabled = false; btn.textContent = '提 交 订 单';
}

// ================================================================
// MY ORDERS TAB
// ================================================================
function renderMyOrders() {
  document.getElementById('mainContent').innerHTML = '<div class="card"><h3>📋 我的订单（本月）</h3><div id="myOrdersList"><div class="empty">加载中...</div></div></div>';
  getToken().then(function(token) {
    return fetch(API+'/api/v1/orders', {headers:{'Authorization':'Bearer '+token}});
  }).then(function(r){return r.json();}).then(function(d) {
    var orders = (d.data && d.data.items) ? d.data.items : [];
    var now = new Date();
    var monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0,10);
    var thisMonth = orders.filter(function(o){ return (o.created_at||'').slice(0,10) >= monthStart; });
    if (!thisMonth.length) {
      document.getElementById('myOrdersList').innerHTML = '<div class="empty">本月暂无订单</div>';
      return;
    }
    document.getElementById('myOrdersList').innerHTML = thisMonth.map(function(o) {
      var rem = o.stage_remark || '';
      var gps = rem.includes('GPS:') ? rem.split('GPS:')[1].split('|')[0] : '-';
      var adv = rem.includes('垫资:') ? rem.split('垫资:')[1].split('|')[0] : '-';
      var stage = o.stage || '-';
      var cls = stage.includes('已抵押')||stage.includes('结清')||stage.includes('完成') ? 'bg-grn' : stage.includes('抵押') ? 'bg-blu' : stage.includes('GPS')||stage.includes('已提交') ? 'bg-yel' : 'bg-blu';
      return '<div class="order-item">'+
        '<div class="oi-top">'+
          '<div><div class="oi-name">'+o.customer_name+'</div><div class="oi-car">'+o.car_brand+' '+o.car_model+'</div></div>'+
          '<div class="oi-amount"><div class="v">¥'+fmt(o.loan_amount)+'</div><div class="l">贷款金额</div></div>'+
        '</div>'+
        '<div class="oi-meta">'+
          '<span class="bdg '+cls+'">'+stage+'</span>'+
          '<span class="bdg bg-blu">GPS:'+gps+'</span>'+
          '<span class="bdg bg-blu">垫资:'+adv+'</span>'+
        '</div>'+
      '</div>';
    }).join('');
  }).catch(function(){ document.getElementById('myOrdersList').innerHTML='<div class="empty">加载失败</div>'; });
}

// ================================================================
// SUPPLEMENT TAB
// ================================================================
function renderSupplement() {
  document.getElementById('mainContent').innerHTML = `
  <div class="card">
    <h3>🔄 二次提交（抵押登记 + 人车合影）</h3>
    <div style="padding:10px 14px;background:#fff8e1;border-radius:8px;font-size:13px;color:#888;margin-bottom:16px">说明：选择已有订单，填写抵押信息并上传人车合影照片后提交。</div>
    <div class="form-group">
      <label>选择订单 <span style="color:red">*</span></label>
      <select id="sOrderId" onchange="loadSOrder()">
        <option value="">请选择订单（加载中...）</option>
      </select>
    </div>
    <div id="sInfo" style="display:none">
      <div class="sinfo">
        <div class="row"><span class="k">客户姓名</span><span class="v" id="sName">-</span></div>
        <div class="row"><span class="k">车牌号</span><span class="v" id="sPlate">-</span></div>
        <div class="row"><span class="k">贷款金额</span><span class="v" id="sLoan">-</span></div>
        <div class="row"><span class="k">当前阶段</span><span class="v" id="sStage">-</span></div>
      </div>
      <div class="form-grid">
        <div class="form-group"><label>抵押银行 <span style="color:red">*</span></label><input id="sBank" placeholder="如：工商银行"></div>
        <div class="form-group"><label>抵押日期 <span style="color:red">*</span></label><input id="sDate" type="date"></div>
      </div>
      <div class="form-group"><label>抵押登记证号 <span style="color:red">*</span></label><input id="sCertNo" placeholder="如：BJ20240001"></div>
      <div class="form-group">
        <label>人车合影照片（点击上传）</label>
        <div style="border:2px dashed #ddd;border-radius:10px;padding:20px;text-align:center;cursor:pointer" id="sPhotoBox" onclick="document.getElementById('sPhotoInput').click()">
          <div id="sPhotoPrev" style="display:none">
            <img id="sPhotoImg" style="max-width:100%;max-height:180px;border-radius:8px">
            <div style="margin-top:6px;font-size:12px;color:#52c41a">点击重新上传</div>
          </div>
          <div id="sPhotoPlace">
            <div style="font-size:28px;margin-bottom:6px">📷</div>
            <div style="font-size:13px;color:#aaa">点击上传人车合影照片</div>
          </div>
        </div>
        <input id="sPhotoInput" type="file" accept="image/*" style="display:none" onchange="previewSPhoto(this)">
      </div>
      <button class="submit-btn" id="sSubmitBtn" onclick="submitSupplement()">提 交 二 次 资 料</button>
    </div>
  </div>`;
  loadSPendingOrders();
}

function loadSPendingOrders() {
  getToken().then(function(token) {
    return fetch(API+'/api/v1/orders', {headers:{'Authorization':'Bearer '+token}});
  }).then(function(r){return r.json();}).then(function(d) {
    var orders = (d.data && d.data.items) ? d.data.items : [];
    var pending = orders.filter(function(o) {
      var rem = o.stage_remark || '';
      return !rem.includes('抵押银行:');
    });
    var sel = document.getElementById('sOrderId');
    if (!pending.length) {
      sel.innerHTML = '<option value="">暂无可二次提交的订单</option>';
      return;
    }
    sel.innerHTML = '<option value="">请选择订单</option>' + pending.map(function(o) {
      return '<option value="'+(o.order_id||'')+'">'+(o.order_id||'')+' - '+(o.customer_name||'客户')+' - '+(o.car_brand||'')+' '+(o.car_model||'')+'</option>';
    }).join('');
  }).catch(function(){ document.getElementById('sOrderId').innerHTML='<option value="">加载失败</option>'; });
}

function loadSOrder() {
  var oid = document.getElementById('sOrderId').value;
  var info = document.getElementById('sInfo');
  if (!oid) { if(info) info.style.display='none'; return; }
  if(info) info.style.display='block';
  getToken().then(function(token) {
    return fetch(API+'/api/v1/orders/'+oid, {headers:{'Authorization':'Bearer '+token}});
  }).then(function(r){return r.json();}).then(function(d) {
    var o = d.data && d.data.order;
    if (o) {
      document.getElementById('sName').textContent = o.customer_name || '-';
      document.getElementById('sPlate').textContent = o.plate_number || '陕';
      document.getElementById('sLoan').textContent = '¥' + fmt(o.loan_amount);
      document.getElementById('sStage').textContent = o.stage || '-';
    }
  }).catch(function(){});
}

function previewSPhoto(input) {
  if (!input.files || !input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = document.getElementById('sPhotoImg');
    var prev = document.getElementById('sPhotoPrev');
    var place = document.getElementById('sPhotoPlace');
    if (img) img.src = e.target.result;
    if (prev) prev.style.display = 'block';
    if (place) place.style.display = 'none';
  };
  reader.readAsDataURL(input.files[0]);
}

function fileToBase64(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function(e) { resolve(e.target.result); };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function submitSupplement() {
  var oid = document.getElementById('sOrderId').value;
  var bank = document.getElementById('sBank').value.trim();
  var date = document.getElementById('sDate').value;
  var certNo = document.getElementById('sCertNo').value.trim();
  var photoInput = document.getElementById('sPhotoInput');
  var photoBase64 = '';
  if (photoInput && photoInput.files && photoInput.files[0]) {
    photoBase64 = await fileToBase64(photoInput.files[0]);
  }
  if (!oid) { toast('请选择订单！', true); return; }
  if (!bank) { toast('请填写抵押银行！', true); return; }
  if (!date) { toast('请填写抵押日期！', true); return; }
  if (!certNo) { toast('请填写抵押登记证号！', true); return; }

  var btn = document.getElementById('sSubmitBtn');
  if (btn) { btn.disabled = true; btn.textContent = '提交中...'; }

  try {
    var token = await getToken();
    var h = {'Content-Type':'application/json', 'Authorization':'Bearer '+token};
    var rem = '|抵押银行:'+bank+'|抵押日期:'+date+'|抵押证号:'+certNo;
    await fetch(API+'/api/v1/orders/'+oid+'/stage', {
      method:'PUT', headers:h,
      body: JSON.stringify({new_stage:'抵押登记中', remark: rem})
    });
    await fetch(API+'/api/v1/mortgage', {
      method:'POST', headers:h,
      body: JSON.stringify({
        order_id: oid,
        mortgage_bank: bank,
        register_date: date,
        certificate_number: certNo,
        person_car_photo: photoBase64
      })
    });
    toast('二次提交成功！');
    document.getElementById('sOrderId').value = '';
    document.getElementById('sInfo').style.display = 'none';
    document.getElementById('sBank').value = '';
    document.getElementById('sDate').value = '';
    document.getElementById('sCertNo').value = '';
    document.getElementById('sPhotoInput').value = '';
    var prev = document.getElementById('sPhotoPrev');
    var place = document.getElementById('sPhotoPlace');
    if (prev) prev.style.display = 'none';
    if (place) place.style.display = 'block';
    loadSPendingOrders();
  } catch(e) { toast('提交失败：'+(e.message||'未知'), true); }
  if (btn) { btn.disabled = false; btn.textContent = '提 交 二 次 资 料'; }
}

// ================================================================
// STAT TAB
// ================================================================
function renderStat() {
  document.getElementById('mainContent').innerHTML = '<div class="card"><h3>📊 我的业绩（本月）</h3><div id="statContent"><div class="empty">加载中...</div></div></div>';
  getToken().then(function(token) {
    return fetch(API+'/api/v1/orders', {headers:{'Authorization':'Bearer '+token}});
  }).then(function(r){return r.json();}).then(function(d) {
    var orders = (d.data && d.data.items) ? d.data.items : [];
    var now = new Date();
    var monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0,10);
    var thisMonth = orders.filter(function(o){ return (o.created_at||'').slice(0,10) >= monthStart; });
    var totalLoan = thisMonth.reduce(function(s,o){ return s+(o.loan_amount||0); }, 0);
    var totalMonthly = thisMonth.reduce(function(s,o){ return s+(o.monthly_payment||0); }, 0);
    document.getElementById('statContent').innerHTML =
      '<div class="stat-grid">'+
        '<div class="stat-card"><div class="v">'+thisMonth.length+'</div><div class="l">本月订单数</div></div>'+
        '<div class="stat-card"><div class="v">¥'+(totalLoan>0?(totalLoan/10000).toFixed(1)+'万':'0')+'</div><div class="l">本月放款额</div></div>'+
        '<div class="stat-card"><div class="v">¥'+(totalMonthly>0?(totalMonthly/10000).toFixed(1)+'万':'0')+'</div><div class="l">月供合计/月</div></div>'+
        '<div class="stat-card"><div class="v">¥'+fmt(totalLoan+totalMonthly)+'</div><div class="l">累计金额</div></div>'+
      '</div>';
  }).catch(function(){ document.getElementById('statContent').innerHTML='<div class="empty">加载失败</div>'; });
}
</script>
