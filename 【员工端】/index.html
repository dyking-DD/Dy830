<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI CAR - 员工工作台</title>
<style>
:root {
  --primary: #1A3A6B;
  --accent: #FF6B35;
  --bg: #F5F5F5;
  --card: #FFFFFF;
  --text: #333;
  --text-light: #888;
  --success: #52c41a;
  --danger: #ff4d4f;
  --warning: #faad14;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); }

/* 登录页 */
.login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--primary) 0%, #2a5298 100%); }
.login-box { background: white; border-radius: 16px; padding: 40px; width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); text-align: center; }
.login-box h1 { color: var(--primary); font-size: 22px; margin-bottom: 6px; }
.login-box p { color: var(--text-light); font-size: 13px; margin-bottom: 24px; }
.login-box input { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: var(--radius); font-size: 15px; margin-bottom: 12px; outline: none; }
.login-box input:focus { border-color: var(--primary); }
.login-box button { width: 100%; padding: 13px; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; }
.login-error { color: var(--danger); font-size: 13px; margin-top: 8px; display: none; }

/* 员工页面 */
.staff-page { display: none; }

/* 顶部 */
.navbar {
  background: linear-gradient(135deg, var(--primary) 0%, #2a5298 100%);
  color: white; padding: 14px 20px; display: flex; align-items: center;
  justify-content: space-between; position: sticky; top: 0; z-index: 100;
}
.navbar h2 { font-size: 17px; }
.nav-right { display: flex; align-items: center; gap: 12px; }
.nav-right span { font-size: 13px; opacity: 0.9; }
.logout-btn { background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 5px 14px; border-radius: 20px; cursor: pointer; font-size: 12px; }

/* 内容 */
.content { padding: 16px 16px 40px; max-width: 800px; margin: 0 auto; }

/* 标签 */
.tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.tab-btn { padding: 9px 18px; border: none; background: var(--card); border-radius: var(--radius); cursor: pointer; font-size: 14px; box-shadow: var(--shadow); }
.tab-btn.active { background: var(--accent); color: white; }

/* 卡片 */
.card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px; }
.card h3 { font-size: 15px; color: var(--primary); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #f0f0f0; }

/* 表单 */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-full { grid-column: 1 / -1; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group label { font-size: 12px; color: var(--text-light); font-weight: 500; }
.form-group label span { color: var(--danger); }
.form-group input, .form-group select {
  padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; background: white;
}
.form-group input:focus { border-color: var(--primary); }
.form-group input[readonly] { background: #f5f5f5; color: var(--text-light); }
textarea.form-control { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; resize: vertical; min-height: 80px; outline: none; }
textarea.form-control:focus { border-color: var(--primary); }

/* 按钮 */
.submit-btn { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 16px; }
.submit-btn:hover { background: #e55d2a; }
.submit-btn:disabled { background: #ccc; cursor: not-allowed; }

/* 列表 */
.order-item { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; margin-bottom: 12px; border-left: 4px solid var(--primary); }
.order-item.overdue { border-left-color: var(--danger); }
.order-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.order-item-id { font-size: 13px; color: var(--text-light); }
.order-item-name { font-size: 16px; font-weight: 600; color: var(--primary); }
.order-item-status { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
.status-pending { background: #fffbe6; color: var(--warning); }
.status-doing { background: #e6f0ff; color: var(--primary); }
.status-done { background: #e6f7e6; color: var(--success); }
.status-error { background: #fff1f0; color: var(--danger); }
.order-item-info { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 13px; color: var(--text-light); }
.order-item-info strong { color: var(--text); font-weight: 500; }

/* 空状态 */
.empty { text-align: center; padding: 40px; color: var(--text-light); font-size: 14px; }

/* 提示 */
.toast { position: fixed; top: 70px; right: 16px; background: var(--success); color: white; padding: 10px 20px; border-radius: 8px; font-size: 14px; display: none; z-index: 200; }
.toast.error { background: var(--danger); }
.toast.warning { background: var(--warning); color: var(--text); }

/* 我的业绩 */
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.stat-item { background: var(--card); border-radius: var(--radius); padding: 16px; text-align: center; box-shadow: var(--shadow); }
.stat-item .num { font-size: 26px; font-weight: 700; color: var(--primary); }
.stat-item .label { font-size: 12px; color: var(--text-light); margin-top: 4px; }
.stat-item.orange .num { color: var(--accent); }
.stat-item.danger .num { color: var(--danger); }
</style>
</head>
<body>

<!-- 登录页 -->
<div class="login-page" id="loginPage">
  <div class="login-box">
    <h1>🚗 AI CAR 员工工作台</h1>
    <p>汽车分期业务管理系统</p>
    <input type="password" id="passwordInput" placeholder="请输入员工密码" onkeydown="if(event.key==='Enter')staffLogin()">
    <button onclick="staffLogin()">登 录</button>
    <div class="login-error" id="loginError">密码错误，请重试</div>
  </div>
</div>

<!-- 员工工作台 -->
<div class="staff-page" id="staffPage">

  <!-- 顶部 -->
  <div class="navbar">
    <h2>🚗 AI CAR 员工工作台</h2>
    <div class="nav-right">
      <span id="staffName">员工</span>
      <button class="logout-btn" onclick="staffLogout()">退出</button>
    </div>
  </div>

  <!-- 内容 -->
  <div class="content">

    <!-- 标签页 -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('new')">📝 新建订单</button>
      <button class="tab-btn" onclick="switchTab('my')">📋 我的订单</button>
      <button class="tab-btn" onclick="switchTab('stat')">📊 我的业绩</button>
    </div>

    <!-- 新建订单 -->
    <div id="newTab">
      <div class="card">
        <h3>📝 新建分期订单</h3>
        <div class="form-grid">
          <div class="form-group form-full">
            <label>客户姓名 <span>*</span></label>
            <input id="fName" placeholder="请输入客户真实姓名">
          </div>
          <div class="form-group">
            <label>手机号码 <span>*</span></label>
            <input id="fPhone" placeholder="11位手机号" maxlength="11">
          </div>
          <div class="form-group">
            <label>身份证号</label>
            <input id="fIdNum" placeholder="18位身份证号" maxlength="18">
          </div>
          <div class="form-group form-full">
            <label>客户地址</label>
            <input id="fAddress" placeholder="详细地址">
          </div>
          <div class="form-group">
            <label>汽车品牌 <span>*</span></label>
            <input id="fBrand" placeholder="如：宝马">
          </div>
          <div class="form-group">
            <label>车型 <span>*</span></label>
            <input id="fModel" placeholder="如：320Li">
          </div>
          <div class="form-group">
            <label>车价（元）<span>*</span></label>
            <input id="fPrice" placeholder="如：350000" type="number" oninput="calcMonthly()">
          </div>
          <div class="form-group">
            <label>车牌号</label>
            <input id="fPlate" placeholder="如：京A12345">
          </div>
          <div class="form-group">
            <label>车架号（VIN）</label>
            <input id="fVin" placeholder="17位车架号" maxlength="17">
          </div>
          <div class="form-group">
            <label>首付金额（元）<span>*</span></label>
            <input id="fDown" placeholder="如：70000" type="number" oninput="calcMonthly()">
          </div>
          <div class="form-group">
            <label>贷款金额（元）<span>*</span></label>
            <input id="fLoan" placeholder="自动计算" type="number" readonly style="background:#f0f0f0;color:#888">
          </div>
          <div class="form-group">
            <label>分期期数 <span>*</span></label>
            <select id="fPeriod" onchange="calcMonthly()">
              <option value="12">12期（1年）</option>
              <option value="24">24期（2年）</option>
              <option value="36" selected>36期（3年）</option>
              <option value="48">48期（4年）</option>
              <option value="60">60期（5年）</option>
            </select>
          </div>
          <div class="form-group">
            <label>月供金额（元）</label>
            <input id="fMonthly" placeholder="自动计算" readonly style="background:#f0f0f0">
          </div>
          <div class="form-group">
            <label>合作银行</label>
            <select id="fBank">
              <option value="">请选择银行</option>
              <option>工商银行</option>
              <option>建设银行</option>
              <option>中国银行</option>
              <option>农业银行</option>
              <option>招商银行</option>
              <option>平安银行</option>
              <option>秦农银行</option>
              <option>其他</option>
            </select>
          </div>
          <div class="form-group">
            <label>车行/4S店名称</label>
            <input id="fDealer" placeholder="如：宝泽4S店">
          </div>
          <div class="form-group form-full">
            <label>备注</label>
            <textarea class="form-control" id="fRemark" placeholder="其他补充说明..."></textarea>
          </div>
        </div>
        <button class="submit-btn" id="submitBtn" onclick="submitOrder()">提 交 订 单</button>
      </div>
    </div>

    <!-- 我的订单 -->
    <div id="myTab" style="display:none">
      <div class="card">
        <h3>📋 我的订单列表</h3>
        <div id="myOrdersList">
          <div class="empty">暂无订单数据</div>
        </div>
      </div>
    </div>

    <!-- 我的业绩 -->
    <div id="statTab" style="display:none">
      <div class="stats-row">
        <div class="stat-item">
          <div class="num" id="statTotal">0</div>
          <div class="label">我的订单总数</div>
        </div>
        <div class="stat-item orange">
          <div class="num" id="statPending">0</div>
          <div class="label">处理中</div>
        </div>
        <div class="stat-item danger">
          <div class="num" id="statDone">0</div>
          <div class="label">已完成</div>
        </div>
      </div>
      <div class="card">
        <h3>📊 贷款统计</h3>
        <div id="statDetail" style="font-size:13px;color:var(--text-light)">
          暂无数据
        </div>
      </div>
    </div>

  </div>
</div>

<!-- 提示 -->
<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:8899';
const STAFF_PASSWORD = '888888'; // 员工密码

function staffLogin() {
  const pw = document.getElementById('passwordInput').value;
  if (pw === STAFF_PASSWORD) {
    localStorage.setItem('staff_token', 'logged');
    localStorage.setItem('staff_name', '员工-' + Math.floor(Math.random()*900+100));
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('staffPage').style.display = 'block';
    document.getElementById('staffName').textContent = localStorage.getItem('staff_name');
    switchTab('new');
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function staffLogout() {
  localStorage.removeItem('staff_token');
  localStorage.removeItem('staff_name');
  location.reload();
}

// 检查登录
if (localStorage.getItem('staff_token')) {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('staffPage').style.display = 'block';
  document.getElementById('staffName').textContent = localStorage.getItem('staff_name');
  switchTab('new');
}

// 切换标签
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target && event.target.classList.add('active');
  document.getElementById('newTab').style.display = name === 'new' ? 'block' : 'none';
  document.getElementById('myTab').style.display = name === 'my' ? 'block' : 'none';
  document.getElementById('statTab').style.display = name === 'stat' ? 'block' : 'none';
  if (name === 'my') loadMyOrders();
  if (name === 'stat') loadMyStats();
}

// 提示
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || '');
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3500);
}

// API
async function getToken() {
  const res = await fetch(API + '/api/v1/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: 'admin', password: 'admin123' })
  }).then(r => r.json());
  return res.data ? res.data.token : '';
}

// 计算月供
function calcMonthly() {
  const price = parseFloat(document.getElementById('fPrice').value) || 0;
  const down = parseFloat(document.getElementById('fDown').value) || 0;
  const period = parseInt(document.getElementById('fPeriod').value) || 36;
  const loan = price - down;
  const monthly = loan / period;
  document.getElementById('fLoan').value = loan > 0 ? loan : '';
  document.getElementById('fMonthly').value = loan > 0 ? monthly.toFixed(2) : '';
}

// 提交订单
async function submitOrder() {
  const name = document.getElementById('fName').value.trim();
  const phone = document.getElementById('fPhone').value.trim();
  const brand = document.getElementById('fBrand').value.trim();
  const model = document.getElementById('fModel').value.trim();
  const price = parseFloat(document.getElementById('fPrice').value);
  const down = parseFloat(document.getElementById('fDown').value);
  const period = parseInt(document.getElementById('fPeriod').value);
  const monthly = parseFloat(document.getElementById('fMonthly').value);

  if (!name || !phone || !brand || !model || !price || !down) {
    showToast('请填写必填项（*标记）', 'error'); return;
  }
  if (phone.length !== 11) {
    showToast('手机号格式不正确', 'error'); return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '提交中...';

  try {
    const token = await getToken();
    const headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };

    // 1. 创建客户
    const customerRes = await fetch(API + '/api/v1/customers', {
      method: 'POST',
      headers,
      body: JSON.stringify({ name, phone, id_number: document.getElementById('fIdNum').value, address: document.getElementById('fAddress').value })
    }).then(r => r.json());

    let customerId = customerRes.data ? customerRes.data.customer_id : '';
    if (!customerId && customerRes.code === 200 && customerRes.data && customerRes.data.customer_id) {
      customerId = customerRes.data.customer_id;
    }

    // 如果客户已存在，用已有客户
    if (!customerId) {
      // 查询已有客户
      const existRes = await fetch(API + '/api/v1/customers?phone=' + phone, { headers }).then(r => r.json());
      if (existRes.data && existRes.data.items && existRes.data.items.length > 0) {
        customerId = existRes.data.items[0].customer_id;
      }
    }

    // 2. 创建车辆
    let vehicleId = '';
    if (document.getElementById('fVin').value || document.getElementById('fPlate').value) {
      const vehicleRes = await fetch(API + '/api/v1/vehicles', {
        method: 'POST',
        headers,
        body: JSON.stringify({
          customer_id: customerId,
          brand, model,
          vin: document.getElementById('fVin').value,
          plate_number: document.getElementById('fPlate').value,
          price
        })
      }).then(r => r.json());
      vehicleId = vehicleRes.data ? vehicleRes.data.vehicle_id : '';
    }

    // 3. 创建订单
    const orderRes = await fetch(API + '/api/v1/orders', {
      method: 'POST',
      headers,
      body: JSON.stringify({
        customer_id: customerId,
        loan_amount: price - down,
        down_payment: down,
        loan_period: period,
        monthly_payment: monthly,
        interest_rate: 0.045,
        bank_name: document.getElementById('fBank').value,
        created_by: localStorage.getItem('staff_name') || '员工'
      })
    }).then(r => r.json());

    if (orderRes.code === 200) {
      showToast('✅ 订单提交成功！');
      // 清空表单
      document.querySelectorAll('#newTab input, #newTab textarea').forEach(i => i.value = '');
      document.getElementById('fPeriod').value = '36';
      // 切换到我的订单
      switchTab('my');
    } else {
      showToast(orderRes.message || '提交失败', 'error');
    }
  } catch(e) {
    showToast('提交失败，请检查后端是否启动', 'error');
  }

  btn.disabled = false;
  btn.textContent = '提 交 订 单';
}

// 加载我的订单
async function loadMyOrders() {
  const list = document.getElementById('myOrdersList');
  list.innerHTML = '<div class="empty">加载中...</div>';
  try {
    const token = await getToken();
    const res = await fetch(API + '/api/v1/orders', {
      headers: { 'Authorization': 'Bearer ' + token }
    }).then(r => r.json());

    const orders = res.data ? (res.data.items || []) : [];
    if (orders.length === 0) {
      list.innerHTML = '<div class="empty">暂无订单</div>';
      return;
    }
    list.innerHTML = orders.map(o => `
      <div class="order-item ${o.stage && o.stage.includes('逾期') ? 'overdue' : ''}">
        <div class="order-item-header">
          <span class="order-item-id">${o.order_id || '-'}</span>
          <span class="order-item-status ${getStatusClass(o.stage)}">${o.stage || '未知'}</span>
        </div>
        <div class="order-item-name">${o.customer_name || '客户'}</div>
        <div class="order-item-info">
          <div>车型：<strong>${o.car_brand || '-'} ${o.car_model || '-'}</strong></div>
          <div>贷款：<strong>${o.loan_amount ? o.loan_amount.toLocaleString() + '元' : '-'}</strong></div>
          <div>月供：<strong>${o.monthly_payment ? o.monthly_payment.toLocaleString() + '元' : '-'}</strong></div>
          <div>期数：<strong>${o.loan_period || '-'}期</strong></div>
          <div>银行：<strong>${o.bank_name || '-'}</strong></div>
          <div>时间：<strong>${(o.created_at || '').slice(0,10)}</strong></div>
        </div>
      </div>
    `).join('');
  } catch(e) {
    list.innerHTML = '<div class="empty">加载失败，请检查后端是否启动</div>';
  }
}

// 加载业绩统计
async function loadMyStats() {
  try {
    const token = await getToken();
    const res = await fetch(API + '/api/v1/orders', {
      headers: { 'Authorization': 'Bearer ' + token }
    }).then(r => r.json());

    const orders = res.data ? (res.data.items || []) : [];
    const total = orders.length;
    const pending = orders.filter(o => !o.stage || (!o.stage.includes('结清') && !o.stage.includes('完结'))).length;
    const done = total - pending;

    document.getElementById('statTotal').textContent = total;
    document.getElementById('statPending').textContent = pending;
    document.getElementById('statDone').textContent = done;

    const totalLoan = orders.reduce((s, o) => s + (o.loan_amount || 0), 0);
    const totalMonthly = orders.reduce((s, o) => s + (o.monthly_payment || 0), 0);
    document.getElementById('statDetail').innerHTML = `
      <p>📊 总贷款额：<strong style="color:var(--primary)">${totalLoan.toLocaleString()} 元</strong></p>
      <p>📊 月供总额：<strong style="color:var(--accent)">${totalMonthly.toLocaleString()} 元/月</strong></p>
      <p>📊 订单总数：<strong>${total} 单</strong></p>
      <p>📊 平均贷款：<strong>${total > 0 ? Math.round(totalLoan/total).toLocaleString() : 0} 元</strong></p>
    `;
  } catch(e) {}
}

function getStatusClass(stage) {
  if (!stage) return 'status-pending';
  if (stage.includes('结清') || stage.includes('完结') || stage.includes('已抵押')) return 'status-done';
  if (stage.includes('逾期')) return 'status-error';
  return 'status-doing';
}
</script>
</body>
</html>
