<!DOCTYPE html>
<html lang="zh-CN">
<head>
<script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大秦分期系统 - 订单查询</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC',sans-serif;background:linear-gradient(135deg,#1a1a0a,#2d1f0a);min-height:100vh;padding:20px}
        .container{max-width:600px;margin:0 auto;background:white;border-radius:20px;overflow:hidden;border:1px solid rgba(212,175,55,.2);box-shadow:0 20px 60px rgba(0,0,0,.3)}
        .header{background:linear-gradient(135deg,#1a1a0a,#2d2000);padding:24px 20px;text-align:center;border-bottom:3px solid #D4AF37}
        .header h1{font-size:18px;color:#D4AF37;font-weight:700;margin-bottom:4px}
        .header p{font-size:12px;color:#c9a84c}
        .form{padding:20px}
        .form-group{margin-bottom:16px}
        .form-group label{display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:6px}
        .form-group input{width:100%;padding:11px 14px;border:2px solid #e5e0d0;border-radius:10px;font-size:14px;background:#faf9f5;transition:all .3s}
        .form-group input:focus{outline:none;border-color:#D4AF37;background:white}
        .submit-btn{width:100%;padding:13px;background:linear-gradient(135deg,#D4AF37,#B8941F);color:#1a1a0a;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 15px rgba(212,175,55,.4);letter-spacing:1px}
        .submit-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(212,175,55,.5)}
        .orders{padding:0}
        .order-card{margin:16px;border:1px solid rgba(212,175,55,.2);border-radius:14px;overflow:hidden;background:#fff}
        .order-card-hd{background:linear-gradient(135deg,#1a1a0a,#2d2000);padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
        .order-card-hd .oid{font-family:monospace;font-weight:700;color:#D4AF37;font-size:13px}
        .order-card-hd .status{padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700}
        .status-pending{background:#fffbe6;color:#faad14}
        .status-approved{background:#f6ffed;color:#52c41a}
        .status-rejected{background:#fff1f0;color:#ff4d4f}
        .order-card-body{padding:14px 16px}
        .order-detail{font-size:13px;color:#666;margin-bottom:6px;display:flex;justify-content:space-between}
        .order-detail strong{color:#D4AF37;font-weight:600}
        .order-detail-val{color:#333;font-weight:500;text-align:right;flex:1;margin-left:10px}
        .order-card-ft{background:#faf9f5;padding:10px 16px;border-top:1px solid #f0ece0;font-size:12px;color:#999;text-align:center}
        .empty{padding:60px 20px;text-align:center;color:#ccc}
        .empty-icon{font-size:48px;margin-bottom:10px}
        .loading{padding:40px;text-align:center;color:#D4AF37}
        .info-box{background:linear-gradient(135deg,#fff9e6,#fff);border:1px solid #D4AF37;border-radius:12px;padding:14px;margin:16px;font-size:12px;color:#888}
        .info-box strong{color:#D4AF37}
        .hint{font-size:11px;color:#999;margin-top:4px}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>大秦分期系统 - 订单查询</h1>
            <p>大秦易购汽车分期报单系统</p>
        </div>
        <div class="form">
            <div class="form-group">
                <label for="phoneInput">请输入报单时的手机号码</label>
                <input type="tel" id="phoneInput" placeholder="请输入11位手机号" maxlength="11">
                <div class="hint">输入提交报单时填写的手机号码查询</div>
            </div>
            <button class="submit-btn" onclick="queryOrders()">🔍 查询我的报单</button>
        </div>
        <div class="orders" id="ordersContainer">
            <div class="info-box">📌 输入手机号后可查看您提交的所有报单及其审核状态</div>
        </div>
    </div>
    <script>
        function queryOrders(){
            var phone=document.getElementById('phoneInput').value.trim();
            if(!/^1[3-9]\d{9}$/.test(phone)){alert('请输入正确的11位手机号');return}
            var container=document.getElementById('ordersContainer');
            container.innerHTML='<div class="loading">⏳ 正在查询...</div>';
            fetch('/api/my-orders?phone='+encodeURIComponent(phone))
                .then(function(r){return r.json()})
                .then(function(d){
                    var orders=d.orders||[];
                    if(!orders.length){
                        container.innerHTML='<div class="empty"><div class="empty-icon">📋</div>未找到相关报单记录<br><small style="color:#ccc;font-size:13px">请确认手机号是否正确</small></div>';
                        return;
                    }
                    container.innerHTML=orders.map(function(o){
                        var st=o.status==='approved'?'已通过':o.status==='rejected'?'已拒绝':'待审批';
                        var stCls=o.status==='approved'?'status-approved':o.status==='rejected'?'status-rejected':'status-pending';
                        var stTxt=o.status==='approved'?'✅ 已通过':o.status==='rejected'?'❌ 已拒绝':'⏳ 待审批';
                        return'<div class="order-card">'+
                            '<div class="order-card-hd">'+
                                '<span class="oid">'+o.order_id+'</span>'+
                                '<span class="status '+stCls+'">'+st+'</span>'+
                            '</div>'+
                            '<div class="order-card-body">'+
                                '<div class="order-detail"><span>🚗 车型</span><span class="order-detail-val">'+o.car_brand+' '+o.car_model+'</span></div>'+
                                '<div class="order-detail"><span>💰 车价</span><span class="order-detail-val">'+o.car_price+' 万元</span></div>'+
                                '<div class="order-detail"><span>⬇ 首付</span><span class="order-detail-val">'+o.down_payment+' 万元</span></div>'+
                                '<div class="order-detail"><span>💳 贷款</span><span class="order-detail-val">'+o.loan_amount+' 万元</span></div>'+
                                '<div class="order-detail"><span>📅 期数</span><span class="order-detail-val">'+o.loan_term+' 期</span></div>'+
                                '<div class="order-detail"><span>🏢 经销商</span><span class="order-detail-val">'+(o.dealer_name||'-')+'</span></div>'+
                                '<div class="order-detail"><span>👔 业务员</span><span class="order-detail-val">'+o.salesperson+'</span></div>'+
                                '<div class="order-detail"><span>📅 提交时间</span><span class="order-detail-val">'+(o.submit_time?new Date(o.submit_time).toLocaleString('zh-CN'):'-')+'</span></div>'+
                                (o.remarks?'<div class="order-detail" style="margin-top:8px;background:#faf9f5;padding:8px;border-radius:6px"><span>📋 审批备注</span><span class="order-detail-val" style="color:#fa8c16">'+o.remarks+'</span></div>':'')+
                            '</div>'+
                            '<div class="order-card-ft">提交时间：'+(o.submit_time?new Date(o.submit_time).toLocaleDateString('zh-CN'):'-')+' | 状态：'+stTxt+'</div>'+
                        '</div>';
                    }).join('');
                })
                .catch(function(e){
                    container.innerHTML='<div class="empty">⚠ 查询失败，请稍后重试</div>';
                });
        }
        document.getElementById('phoneInput').addEventListener('keypress',function(e){if(e.key==='Enter')queryOrders()});
    </script>
</body>
</html>
