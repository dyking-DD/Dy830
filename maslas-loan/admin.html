<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大秦易购 管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#667eea;--primary-light:#764ba2;--dark:#1a1a2e;--light:#f5f7fa;--border:#e8e8e8;--success:#10b981;--danger:#ef4444;--warning:#f59e0b;--info:#3b82f6}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--light);min-height:100vh}
.topbar{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 4px 12px rgba(102,126,234,0.2)}
.topbar h1{font-size:20px;font-weight:700;letter-spacing:0.5px}
.topbar .logo{color:#fff}
.topbar .user{font-size:13px;opacity:0.9}
.tabs{display:flex;gap:4px;background:#fff;padding:20px 24px 0;border-bottom:1px solid var(--border)}
.tab{padding:12px 24px;cursor:pointer;border-radius:12px 12px 0 0;font-size:14px;font-weight:500;color:#666;transition:all 0.3s ease}
.tab:hover{background:#f5f7fa}
.tab.active{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;font-weight:600;box-shadow:0 -2px 8px rgba(102,126,234,0.3)}
.main{padding:24px}
.stat-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat{background:#fff;border-radius:16px;padding:20px 24px;box-shadow:0 2px 8px rgba(0,0,0,0.04);border-left:4px solid var(--primary);transition:transform 0.2s}
.stat:hover{transform:translateY(-2px)}
.stat-num{font-size:32px;font-weight:700;color:var(--dark);line-height:1.2}
.stat-lbl{font-size:13px;color:#666;margin-top:4px;font-weight:500}
.stat.warning{border-left-color:var(--warning)}
.stat.success{border-left-color:var(--success)}
.stat.danger{border-left-color:var(--danger)}
.stat.info{border-left-color:var(--info)}
.stat.purple{border-left-color:#8b5cf6}
.search-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.search-bar input{flex:1;min-width:200px;padding:12px 16px;border:2px solid var(--border);border-radius:12px;font-size:14px;transition:all 0.2s}
.search-bar input:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 3px rgba(102,126,234,0.1)}
.search-bar select{padding:12px 16px;border:2px solid var(--border);border-radius:12px;font-size:14px;background:#fff}
.search-bar .btn{padding:12px 24px;border:none;border-radius:12px;font-size:14px;cursor:pointer;transition:all 0.2s;font-weight:500}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;font-weight:600}
.btn-primary:hover{opacity:0.9;transform:translateY(-1px);box-shadow:0 4px 12px rgba(102,126,234,0.3)}
.btn-ghost{background:#f5f7fa;color:#666}
.btn-ghost:hover{background:#e8e8e8}
.btn-delete{background:var(--danger);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-warning{background:var(--warning);color:#fff}
.btn-sm{padding:8px 16px;font-size:12px;border-radius:8px;border:none;cursor:pointer;font-weight:500}
.filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.filters select{padding:10px 16px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:#fff}
.table-wrap{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:linear-gradient(135deg,rgba(102,126,234,0.05),rgba(118,75,162,0.05))}
th{text-align:left;padding:14px 18px;font-weight:600;color:#555;font-size:12px;border-bottom:2px solid var(--border);white-space:nowrap}
td{padding:14px 18px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
td a{color:var(--primary);text-decoration:none;font-weight:500}
td a:hover{text-decoration:underline}
.tr-approved td{background:#f0fdf4}
.tr-rejected td{background:#fef2f2}
.tr-pending td{background:#fffbeb}
.tr-funded td{background:#faf5ff}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600}
.badge-pending{background:#fffbeb;color:var(--warning)}
.badge-approved{background:#f0fdf4;color:var(--success)}
.badge-rejected{background:#fef2f2;color:var(--danger)}
.badge-funded{background:#faf5ff;color:#8b5cf6}
.loading{padding:80px;text-align:center;color:#999;font-size:14px}
.error-msg{color:var(--danger);padding:20px;text-align:center;font-size:14px}
.row-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.stats-section{background:#fff;border-radius:16px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.stats-section h3{margin:0 0 20px;font-size:16px;color:var(--dark);display:flex;align-items:center;gap:8px;font-weight:600}
.stats-section h3 button{margin-left:auto;font-size:13px;padding:8px 16px}
.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin-top:24px}
.chart-card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.chart-card h4{margin:0 0 20px;font-size:15px;color:#555;font-weight:600}
.bar-wrap{display:flex;flex-direction:column;gap:10px}
.bar-item{display:flex;align-items:center;gap:12px;font-size:13px}
.bar-label{min-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.bar-track{flex:1;height:24px;background:#f5f7fa;border-radius:12px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-light));border-radius:12px;display:flex;align-items:center;padding-left:12px;font-size:12px;font-weight:600;color:#fff;min-width:fit-content;transition:width 0.6s ease}
.bar-value{min-width:55px;text-align:right;font-weight:600;color:#555;font-size:13px}
.login-overlay{position:fixed;inset:0;background:linear-gradient(135deg,var(--primary),var(--primary-light));display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:#fff;border-radius:16px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3);width:100%;max-width:400px}
.login-box h2{text-align:center;margin-bottom:30px;color:var(--dark);font-size:24px}
.login-box input{width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:12px;font-size:14px;margin-bottom:20px;box-sizing:border-box}
.login-box input:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 3px rgba(102,126,234,0.1)}
.login-box .btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;cursor:pointer;transition:all 0.2s;font-weight:600}
.login-box .error{color:var(--danger);text-align:center;margin-top:15px;font-size:13px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);display:none;align-items:flex-start;justify-content:center;z-index:1100;padding:20px;overflow-y:auto}
.modal-overlay.show{display:flex}
.modal-wrap{background:#fff;max-width:760px;width:100%;margin:auto;border-radius:16px;box-shadow:0 24px 80px rgba(0,0,0,0.35);overflow:hidden}
.modal-header{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;padding:20px 28px;display:flex;align-items:center;justify-content:space-between}
.modal-header h2{font-size:18px;font-weight:700;margin:0}
.modal-header .close-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
.modal-header .close-btn:hover{background:rgba(255,255,255,0.35)}
.modal-body{padding:28px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px}
.detail-row{display:contents}
.detail-row .dk{background:#f8f9ff;padding:12px 16px;font-weight:600;font-size:13px;color:#555;border-bottom:1px solid var(--border)}
.detail-row .dv{background:#fff;padding:12px 16px;font-size:13px;color:var(--dark);border-bottom:1px solid var(--border)}
.detail-row:last-child .dk,.detail-row:last-child .dv{border-bottom:none}
.detail-row .dv.highlight{font-weight:700;color:var(--primary);font-size:15px}
.section-title{font-size:13px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;margin:20px 0 10px;padding-bottom:6px;border-bottom:2px solid var(--border)}
.modal-footer{padding:20px 28px;background:#f8f9ff;border-top:1px solid var(--border);display:flex;gap:12px;justify-content:flex-end;flex-wrap:wrap}
.approve-section{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:16px;margin-bottom:16px}
.approve-section h4{font-size:13px;font-weight:700;color:#166534;margin-bottom:12px}
.approve-section select{padding:10px 14px;border:1px solid #bbf7d0;border-radius:8px;font-size:13px;background:#fff;margin-right:8px}
.approve-section textarea{width:100%;padding:10px 14px;border:1px solid #bbf7d0;border-radius:8px;font-size:13px;margin-top:8px;resize:vertical;min-height:60px}
.print-modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:2000;padding:20px}
.print-modal.show{display:flex}
.print-wrap{background:#fff;max-width:700px;width:100%;max-height:90vh;overflow-y:auto;padding:48px;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.3);position:relative}
.print-wrap h2{text-align:center;margin-bottom:24px;font-size:20px;color:var(--dark)}
.print-close{position:absolute;top:16px;right:16px;background:var(--danger);color:#fff;border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
@media(max-width:768px){
  .topbar h1{font-size:16px}
  .tab{padding:10px 16px;font-size:13px}
  .main{padding:16px}
  table{font-size:12px}
  th,td{padding:10px 12px}
  .stat-bar{grid-template-columns:repeat(2,1fr)}
  .detail-grid{grid-template-columns:1fr}
}
@media print{.topbar,.search-bar,.filters,.row-actions,.tabs,.print-modal,.modal-overlay{display:none!important}}
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>🚗 大秦易购</h2>
    <input type="password" id="loginPassword" placeholder="请输入管理员密码" onkeypress="if(event.key==='Enter')doLogin()">
    <button class="btn btn-primary" onclick="doLogin()">登录</button>
    <div class="error" id="loginError"></div>
  </div>
</div>

<div class="topbar" id="topbar" style="display:none">
  <h1>🚗 <span class="logo">大秦易购</span> 管理后台</h1>
  <div class="user">管理员 <button class="btn btn-sm btn-ghost" onclick="logout()" style="margin-left:10px">退出</button></div>
</div>

<div class="tabs" id="tabs" style="display:none">
  <div class="tab active" id="tab-orders" onclick="switchTab('orders')">📋 订单列表</div>
  <div class="tab" id="tab-stats" onclick="switchTab('stats')">📊 数据统计</div>
  <div class="tab" id="tab-employees" onclick="switchTab('employees')">👥 员工管理</div>
</div>

<div class="main" id="main" style="display:none">
  <div id="panel-orders">
    <div class="stat-bar">
      <div class="stat"><div class="stat-num" id="s-today">-</div><div class="stat-lbl">今日订单</div></div>
      <div class="stat warning"><div class="stat-num" id="s-pending">-</div><div class="stat-lbl">待审批</div></div>
      <div class="stat success"><div class="stat-num" id="s-approved">-</div><div class="stat-lbl">已通过</div></div>
      <div class="stat danger"><div class="stat-num" id="s-rejected">-</div><div class="stat-lbl">已拒绝</div></div>
      <div class="stat purple"><div class="stat-num" id="s-total">-</div><div class="stat-lbl">总订单</div></div>
      <div class="stat info"><div class="stat-num" id="s-loan-total">-</div><div class="stat-lbl">总贷款(万元)</div></div>
    </div>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="搜索订单号、客户姓名、手机号、车辆..." onkeyup="filterOrders()">
      <select id="filter-status" onchange="filterOrders()">
        <option value="">全部状态</option>
        <option value="pending">待审批</option>
        <option value="approved">已通过</option>
        <option value="rejected">已拒绝</option>
        <option value="funded">已放款</option>
      </select>
      <button class="btn btn-primary" onclick="refreshOrders()">🔄 刷新</button>
      <button class="btn btn-ghost" onclick="exportCSV()">📥 导出CSV</button>
    </div>
    <div class="filters" id="filters"></div>
    <div class="table-wrap" id="orders-list"><div class="loading">加载中...</div></div>
  </div>

  <div id="panel-stats" style="display:none">
    <div class="stats-section">
      <h3>📊 员工业绩汇总 <button class="btn btn-sm btn-ghost" onclick="exportStaffStats()">📥 导出员工统计</button></h3>
      <div id="staff-stats" class="chart-grid"></div>
    </div>
    <div class="stats-section">
      <h3>📅 月度统计 <button class="btn btn-sm btn-ghost" onclick="exportMonthStats()">📥 导出月度统计</button></h3>
      <div id="month-stats" class="chart-grid"></div>
    </div>
  </div>

  <div id="panel-employees" style="display:none">
    <div class="stats-section">
      <h3>➕ 添加员工</h3>
      <div class="search-bar">
        <input type="text" id="emp-id" placeholder="员工号" style="flex:0 0 150px">
        <input type="text" id="emp-name" placeholder="姓名" style="flex:0 0 120px">
        <input type="text" id="emp-phone" placeholder="电话" style="flex:0 0 150px">
        <button class="btn btn-primary" onclick="addEmployee()">添加</button>
      </div>
    </div>
    <div class="table-wrap" id="employees-list"><div class="loading">加载中...</div></div>
  </div>
</div>

<!-- 订单详情弹窗 -->
<div class="modal-overlay" id="detailModal" onclick="if(event.target===this)closeDetail()">
  <div class="modal-wrap" id="detailContent"></div>
</div>

<!-- 打印弹窗 -->
<div class="print-modal" id="printModal">
  <div class="print-wrap">
    <button class="print-close" onclick="closePrint()">✕</button>
    <div id="printContent"></div>
    <div style="text-align:center;margin-top:24px">
      <button class="btn btn-primary btn-sm" onclick="window.print()" style="padding:10px 28px;font-size:14px">🖨 打印</button>
      <button class="btn btn-ghost btn-sm" onclick="closePrint()" style="padding:10px 28px;font-size:14px;margin-left:12px">关闭</button>
    </div>
  </div>
</div>

<script>
var ADMIN_PASSWORD = 'Dq7777';
var API = 'https://api.daqinegoglobal.com';
var allOrders = [], filteredOrders = [];

function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escAttr(s){if(s==null)return'';return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#x27;');}

function doLogin(){
  var pwd=document.getElementById('loginPassword').value;
  if(pwd===ADMIN_PASSWORD){
    document.getElementById('loginOverlay').style.display='none';
    document.getElementById('topbar').style.display='flex';
    document.getElementById('tabs').style.display='flex';
    document.getElementById('main').style.display='block';
    loadOrders();
  }else{
    document.getElementById('loginError').textContent='密码错误';
    document.getElementById('loginPassword').value='';
  }
}

function logout(){
  document.getElementById('loginOverlay').style.display='flex';
  document.getElementById('topbar').style.display='none';
  document.getElementById('tabs').style.display='none';
  document.getElementById('main').style.display='none';
  document.getElementById('loginPassword').value='';
  document.getElementById('loginError').textContent='';
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById('tab-'+name).classList.add('active');
  document.getElementById('panel-orders').style.display=name==='orders'?'block':'none';
  document.getElementById('panel-stats').style.display=name==='stats'?'block':'none';
  document.getElementById('panel-employees').style.display=name==='employees'?'block':'none';
  if(name==='stats')drawStats();
  if(name==='employees')loadEmployees();
}

async function loadOrders(){
  var container=document.getElementById('orders-list');
  container.innerHTML='<div class="loading">加载中...</div>';
  try{
    var r=await fetch(API+'/api/all-orders',{headers:{'X-Admin-Token':ADMIN_PASSWORD}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    var d=await r.json();
    if(!d.success)throw new Error(d.message||'加载失败');
    allOrders=d.orders||[];
    filteredOrders=allOrders.slice();
    renderOrders(filteredOrders);
    buildFilters();
    updateStats();
  }catch(e){
    container.innerHTML='<div class="error-msg">加载失败：'+esc(e.message)+'</div>';
  }
}

function renderOrders(orders){
  if(!orders||!orders.length){
    document.getElementById('orders-list').innerHTML='<div class="loading">暂无订单数据</div>';
    return;
  }
  var html='<table><thead><tr><th>订单号</th><th>客户</th><th>车辆</th><th>贷款</th><th>银行</th><th>业务员</th><th>状态</th><th>提交时间</th><th>操作</th></tr></thead><tbody>';
  orders.forEach(function(o){
    var sc='badge-'+(o.status||'pending');
    var sl={pending:'待审批',approved:'已通过',rejected:'已拒绝',funded:'已放款'}[o.status]||'未知';
    var tc='tr-'+(o.status||'pending');
    html+='<tr class="'+tc+'">'+
      '<td style="font-weight:600">'+esc(o.order_id)+'</td>'+
      '<td>'+esc(o.customer_name)+'<br><span style="font-size:11px;color:#999">'+esc(o.customer_phone)+'</span></td>'+
      '<td>'+esc(o.car_brand)+' '+esc(o.car_model)+'</td>'+
      '<td style="font-weight:600;color:var(--primary)">'+esc(o.loan_amount)+'万</td>'+
      '<td>'+esc(o.bank||'-')+'</td>'+
      '<td>'+esc(o.salesperson||'-')+'</td>'+
      '<td><span class="badge '+sc+'">'+sl+'</span></td>'+
      '<td style="color:#666;font-size:12px">'+esc(o.created_at||'')+'</td>'+
      '<td><div class="row-actions">'+
        '<button class="btn btn-sm btn-primary" onclick="viewOrder(\''+escAttr(o.order_id)+'\')">查看</button>'+
        '<button class="btn btn-sm btn-delete" onclick="deleteOrder(\''+escAttr(o.order_id)+'\')">删除</button>'+
      '</div></td>'+
      '</tr>';
  });
  html+='</tbody></table>';
  document.getElementById('orders-list').innerHTML=html;
}

function filterOrders(){
  var search=document.getElementById('search-input').value.toLowerCase();
  var status=document.getElementById('filter-status').value;
  var staff=document.getElementById('filter-staff')?document.getElementById('filter-staff').value:'';
  var dealer=document.getElementById('filter-dealer')?document.getElementById('filter-dealer').value:'';
  filteredOrders=allOrders.filter(function(o){
    var ms=!search||(o.order_id||'').toLowerCase().indexOf(search)>=0||(o.customer_name||'').toLowerCase().indexOf(search)>=0||(o.customer_phone||'').indexOf(search)>=0||(o.car_brand||'').toLowerCase().indexOf(search)>=0;
    var mst=!status||o.status===status;
    var mstf=!staff||o.salesperson===staff||o.staff_id===staff;
    var md=!dealer||o.dealer_name===dealer;
    return ms&&mst&&mstf&&md;
  });
  renderOrders(filteredOrders);
}

function buildFilters(){
  var staffs=[...new Set(allOrders.map(function(o){return o.salesperson||o.staff_id||''}).filter(Boolean))];
  var dealers=[...new Set(allOrders.map(function(o){return o.dealer_name||''}).filter(Boolean))];
  var html='';
  if(staffs.length>0){
    html+='<select id="filter-staff" onchange="filterOrders()"><option value="">全部业务员</option>';
    staffs.forEach(function(s){html+='<option value="'+esc(s)+'">'+esc(s)+'</option>';});
    html+='</select>';
  }
  if(dealers.length>0){
    html+='<select id="filter-dealer" onchange="filterOrders()"><option value="">全部经销商</option>';
    dealers.forEach(function(d){html+='<option value="'+esc(d)+'">'+esc(d)+'</option>';});
    html+='</select>';
  }
  document.getElementById('filters').innerHTML=html;
}

function updateStats(){
  var today=new Date().toISOString().slice(0,10);
  document.getElementById('s-today').textContent=allOrders.filter(function(o){return o.created_at&&o.created_at.indexOf(today)>=0;}).length;
  document.getElementById('s-pending').textContent=allOrders.filter(function(o){return o.status==='pending';}).length;
  document.getElementById('s-approved').textContent=allOrders.filter(function(o){return o.status==='approved';}).length;
  document.getElementById('s-rejected').textContent=allOrders.filter(function(o){return o.status==='rejected';}).length;
  document.getElementById('s-total').textContent=allOrders.length;
  var tl=allOrders.reduce(function(s,o){return s+(parseFloat(o.loan_amount)||0);},0);
  document.getElementById('s-loan-total').textContent=tl>0?tl.toFixed(1):'0';
}

async function refreshOrders(){loadOrders();}

async function deleteOrder(id){
  if(!confirm('确认删除订单 '+id+' 吗？此操作不可恢复！'))return;
  try{
    var r=await fetch(API+'/api/order/'+id,{method:'DELETE',headers:{'X-Admin-Token':ADMIN_PASSWORD}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    var d=await r.json();
    alert(d.success?'✅ 已删除':'❌ '+(d.error||'删除失败'));
    if(d.success)loadOrders();
  }catch(e){alert('删除失败：'+e.message);}
}

async function updateOrderStatus(id){
  var sel=document.getElementById('approve-status-'+id);
  var rem=document.getElementById('approve-remark-'+id);
  if(!sel)return;
  var newStatus=sel.value;
  var remark=rem?rem.value.trim():'';
  if(newStatus==='pending'){alert('请选择审批结果');return;}
  try{
    var action=newStatus==='approved'?'approve':'reject';
    var r=await fetch(API+'/api/approve-order',{
      method:'POST',
      headers:{'Content-Type':'application/json','X-Admin-Token':ADMIN_PASSWORD},
      body:JSON.stringify({orderId:id,action:action})
    });
    if(!r.ok)throw new Error('HTTP '+r.status);
    var d=await r.json();
    if(d.success){
      alert('✅ 订单已'+(action==='approve'?'通过':'拒绝'));
      closeDetail();
      loadOrders();
    }else{
      alert('❌ '+(d.error||'操作失败'));
    }
  }catch(e){alert('操作失败：'+e.message);}
}

function exportCSV(){
  if(!filteredOrders.length){alert('没有订单可导出');return;}
  var headers=['订单号','客户姓名','联系电话','身份证号','经销商','车辆品牌','车型','颜色','车价(万)','首付(万)','贷款(万)','期数','银行','GPS','抵押','员工号','业务员','状态','提交时间','备注'];
  var csv=String.fromCharCode(0xFEFF)+headers.join(',')+'\n';
  filteredOrders.forEach(function(o){
    csv+=[o.order_id,o.customer_name,o.customer_phone,o.id_card,o.dealer_name,o.car_brand,o.car_model,o.car_color,o.car_price,o.down_payment,o.loan_amount,o.loan_term,o.bank||'',o.has_gps==='yes'?'是':'否',o.has_mortgage==='yes'?'是':'否',o.staff_id,o.salesperson||'',o.status,o.created_at||'',o.notes||''].map(function(x){return'"'+String(x||'').replace(/"/g,'""')+'"';}).join(',')+'\n';
  });
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='大秦易购订单_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

function exportStaffStats(){
  var sm={};
  allOrders.forEach(function(o){
    var k=o.salesperson||o.staff_id||'未知';
    if(!sm[k])sm[k]={count:0,approved:0,loan:0};
    sm[k].count++;
    if(o.status==='approved')sm[k].approved++;
    sm[k].loan+=parseFloat(o.loan_amount)||0;
  });
  var csv=String.fromCharCode(0xFEFF)+'员工号,订单数,已通过数,通过率,总贷款(万元)\n';
  Object.entries(sm).forEach(function(e){
    var rate=e[1].count>0?Math.round((e[1].approved/e[1].count)*100):0;
    csv+='"'+e[0]+'",'+e[1].count+','+e[1].approved+','+rate+'%,'+e[1].loan.toFixed(1)+'\n';
  });
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='大秦易购员工统计_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

function exportMonthStats(){
  var mm={};
  allOrders.forEach(function(o){
    if(!o.created_at)return;
    var m=o.created_at.slice(0,7);
    if(!mm[m])mm[m]={count:0,approved:0};
    mm[m].count++;
    if(o.status==='approved')mm[m].approved++;
  });
  var csv=String.fromCharCode(0xFEFF)+'月份,订单数,已通过数,通过率\n';
  Object.keys(mm).sort().reverse().forEach(function(m){
    var rate=mm[m].count>0?Math.round((mm[m].approved/mm[m].count)*100):0;
    csv+=m+','+mm[m].count+','+mm[m].approved+','+rate+'%\n';
  });
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='大秦易购月度统计_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

function drawStats(){
  var sm={};
  allOrders.forEach(function(o){
    var k=o.salesperson||o.staff_id||'未知';
    if(!sm[k])sm[k]={count:0,approved:0,loan:0};
    sm[k].count++;
    if(o.status==='approved')sm[k].approved++;
    sm[k].loan+=parseFloat(o.loan_amount)||0;
  });
  var maxC=Math.max.apply(null,Object.values(sm).map(function(s){return s.count;}));
  var html='';
  Object.entries(sm).forEach(function(e){
    var pct=maxC>0?(e[1].count/maxC)*100:0;
    html+='<div class="chart-card"><h4>'+esc(e[0])+'</h4>'+
      '<div class="bar-wrap">'+
        '<div class="bar-item"><div class="bar-label">订单数</div><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%">'+e[1].count+'</div></div><div class="bar-value">'+e[1].approved+'通过</div></div>'+
        '<div class="bar-item"><div class="bar-label">总贷款</div><div class="bar-track"><div class="bar-fill" style="width:100%;background:linear-gradient(90deg,#10b981,#059669)">'+e[1].loan.toFixed(1)+'万</div></div><div class="bar-value"></div></div>'+
      '</div></div>';
  });
  document.getElementById('staff-stats').innerHTML=html||'<div class="loading">暂无数据</div>';
  var mm={};
  allOrders.forEach(function(o){
    if(!o.created_at)return;
    var m=o.created_at.slice(0,7);
    if(!mm[m])mm[m]={count:0,approved:0};
    mm[m].count++;
    if(o.status==='approved')mm[m].approved++;
  });
  var mk=Object.keys(mm).sort().reverse();
  var maxM=Math.max.apply(null,Object.values(mm).map(function(m){return m.count;}));
  html='';
  mk.forEach(function(m){
    var pct=maxM>0?(mm[m].count/maxM)*100:0;
    var rate=mm[m].count>0?Math.round((mm[m].approved/mm[m].count)*100):0;
    html+='<div class="chart-card"><h4>'+m+'</h4>'+
      '<div class="bar-wrap">'+
        '<div class="bar-item"><div class="bar-label">订单数</div><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%">'+mm[m].count+'</div></div><div class="bar-value">'+rate+'%</div></div>'+
        '<div class="bar-item"><div class="bar-label">通过率</div><div class="bar-track"><div class="bar-fill" style="width:'+rate+'%;background:linear-gradient(90deg,#10b981,#059669)">'+rate+'%</div></div><div class="bar-value"></div></div>'+
      '</div></div>';
  });
  document.getElementById('month-stats').innerHTML=html||'<div class="loading">暂无数据</div>';
}

async function loadEmployees(){
  var container=document.getElementById('employees-list');
  container.innerHTML='<div class="loading">加载中...</div>';
  try{
    var r=await fetch(API+'/api/employees',{headers:{'X-Admin-Token':ADMIN_PASSWORD}});
    var d=await r.json();
    if(!d.employees||!d.employees.length){container.innerHTML='<div class="loading">暂无员工数据</div>';return;}
    var html='<table><thead><tr><th>员工号</th><th>姓名</th><th>电话</th><th>添加时间</th><th>操作</th></tr></thead><tbody>';
    d.employees.forEach(function(e){
      html+='<tr>'+
        '<td style="font-weight:600">'+esc(e.employee_id)+'</td>'+
        '<td>'+esc(e.name)+'</td>'+
        '<td>'+esc(e.phone||'')+'</td>'+
        '<td style="color:#666;font-size:12px">'+(e.created_at?e.created_at.slice(0,10):'')+'</td>'+
        '<td><button class="btn btn-sm btn-delete" onclick="delEmployee(\''+escAttr(e.employee_id)+'\')">删除</button></td>'+
        '</tr>';
    });
    html+='</tbody></table>';
    container.innerHTML=html;
  }catch(e){container.innerHTML='<div class="error-msg">加载失败：'+esc(e.message)+'</div>';}
}

async function addEmployee(){
  var id=document.getElementById('emp-id').value.trim();
  var name=document.getElementById('emp-name').value.trim();
  var phone=document.getElementById('emp-phone').value.trim();
  if(!id){alert('请输入员工号');return;}
  if(!name){alert('请输入姓名');return;}
  try{
    var r=await fetch(API+'/api/employees',{method:'POST',headers:{'Content-Type':'application/json','X-Admin-Token':ADMIN_PASSWORD},body:JSON.stringify({employee_id:id,name:name,phone:phone||null})});
    var d=await r.json();
    alert(d.success?'✅ 员工已添加':'❌ '+(d.error||'添加失败'));
    if(d.success){
      document.getElementById('emp-id').value='';
      document.getElementById('emp-name').value='';
      document.getElementById('emp-phone').value='';
      loadEmployees();
    }
  }catch(e){alert('添加失败：'+e.message);}
}

async function delEmployee(id){
  if(!confirm('确认删除员工 '+id+' 吗？'))return;
  try{
    var r=await fetch(API+'/api/employees/'+id,{method:'DELETE',headers:{'X-Admin-Token':ADMIN_PASSWORD}});
    var d=await r.json();
    alert(d.success?'✅ 已删除':'❌ '+(d.error||'删除失败'));
    if(d.success)loadEmployees();
  }catch(e){alert('删除失败：'+e.message);}
}
