<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI CAR 管理后台</title>
<style>
:root {
  --primary: #5B21B6;
  --primary-light: #7C3AED;
  --accent: #F97316;
  --bg: #F5F5F5;
  --card: #FFFFFF;
  --text: #333;
  --text-light: #888;
  --success: #52c41a;
  --danger: #ff4d4f;
  --warning: #faad14;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); }

/* 登录页 */
.login-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
}
.login-box {
  background: white;
  border-radius: 16px;
  padding: 40px;
  width: 360px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  text-align: center;
}
.login-box h1 { color: #5B21B6; font-size: 24px; margin-bottom: 8px; }
.login-box p { color: var(--text-light); font-size: 14px; margin-bottom: 30px; }
.login-box input {
  width: 100%; padding: 14px 16px; border: 1px solid #ddd;
  border-radius: var(--radius); font-size: 16px; margin-bottom: 16px;
  outline: none; transition: border 0.2s;
}
.login-box input:focus { border-color: var(--primary); }
.login-box button {
  width: 100%; padding: 14px; background: var(--accent);
  color: white; border: none; border-radius: var(--radius);
  font-size: 16px; font-weight: 600; cursor: pointer;
}
.login-box button:hover { background: #e55d2a; }
.login-error { color: var(--danger); font-size: 13px; margin-top: 10px; display: none; }

/* 管理页面 */
.admin-page { display: none; }

/* 顶部导航 */
.navbar {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  color: white; padding: 16px 24px; display: flex;
  align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.navbar h2 { font-size: 18px; font-weight: 600; }
.navbar-right { display: flex; align-items: center; gap: 16px; }
.navbar-right span { font-size: 14px; opacity: 0.9; }
.logout-btn {
  background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3);
  padding: 6px 16px; border-radius: 20px; cursor: pointer; font-size: 13px;
}

/* 内容区 */
.content { padding: 20px 24px; max-width: 1200px; margin: 0 auto; }

/* 数字卡片 */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.stat-card {
  background: var(--card); border-radius: var(--radius);
  padding: 20px; box-shadow: var(--shadow);
}
.stat-card .num {
  font-size: 32px; font-weight: 700; color: var(--primary);
  line-height: 1;
}
.stat-card .label { color: var(--text-light); font-size: 13px; margin-top: 6px; }
.stat-card.orange .num { color: var(--accent); }
.stat-card.danger .num { color: var(--danger); }
.stat-card.success .num { color: var(--success); }

/* 标签页 */
.tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.tab-btn {
  padding: 10px 20px; border: none; background: var(--card);
  border-radius: var(--radius); cursor: pointer; font-size: 14px;
  box-shadow: var(--shadow); transition: all 0.2s;
}
.tab-btn.active { background: var(--primary); color: white; }

/* 表格 */
.table-wrap { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
th { background: #f8f9fa; padding: 12px 16px; text-align: left; font-size: 13px; color: var(--text-light); font-weight: 500; }
td { padding: 12px 16px; border-top: 1px solid #f0f0f0; font-size: 14px; }
tr:hover td { background: #fafafa; }
.badge {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-size: 12px; font-weight: 500;
}
.badge-green { background: #e6f7e6; color: var(--success); }
.badge-red { background: #fff1f0; color: var(--danger); }
.badge-yellow { background: #fffbe6; color: var(--warning); }
.badge-blue { background: #e6f0ff; color: var(--primary); }

/* 添加表单 */
.form-section { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; }
.form-section h3 { margin-bottom: 20px; font-size: 16px; color: var(--primary); }
.form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: 13px; color: var(--text-light); font-weight: 500; }
.form-group input, .form-group select {
  padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px;
  font-size: 14px; outline: none;
}
.form-group input:focus { border-color: var(--primary); }
.submit-btn {
  background: var(--accent); color: white; border: none;
  padding: 12px 32px; border-radius: var(--radius);
  font-size: 15px; font-weight: 600; cursor: pointer;
}
.submit-btn:hover { background: #e55d2a; }

/* 通知 */
.toast {
  position: fixed; top: 80px; right: 20px; background: var(--success);
  color: white; padding: 12px 24px; border-radius: 8px;
  font-size: 14px; display: none; z-index: 200;
  animation: slideIn 0.3s;
}
.toast.error { background: var(--danger); }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* 刷新按钮 */
.refresh-btn {
  background: var(--card); border: 1px solid #ddd;
  padding: 8px 16px; border-radius: 8px; cursor: pointer;
  font-size: 13px;
}

/* 弹窗 */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4); display: none; align-items: center;
  justify-content: center; z-index: 300;
}
.modal {
  background: white; border-radius: 16px; padding: 32px;
  width: 500px; max-width: 90vw; max-height: 80vh; overflow-y: auto;
}
.modal h3 { margin-bottom: 20px; color: var(--primary); }
.modal-close { float: right; cursor: pointer; font-size: 20px; color: var(--text-light); }
.modal-close:hover { color: var(--danger); }
.detail-item { background: #f8f9fa; border-radius: 6px; padding: 10px 12px; }
.detail-label { font-size: 11px; color: var(--text-light); margin-bottom: 3px; }
.detail-value { font-size: 14px; font-weight: 600; color: var(--text); }
</style>
</head>
<body>

<!-- 登录页 -->
<div class="login-page" id="loginPage">
  <div class="login-box">
    <h1>🚗 AI CAR</h1>
    <p>汽车分期智能管理平台</p>
    <input type="password" id="passwordInput" placeholder="请输入管理密码" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">登 录</button>
    <div class="login-error" id="loginError">密码错误，请重试</div>
  </div>
</div>

<!-- 管理页面 -->
<div class="admin-page" id="adminPage">

  <!-- 顶部 -->
  <div class="navbar">
    <h2>🚗 AI CAR 管理后台</h2>
    <div class="navbar-right">
      <span id="currentTime"></span>
      <button class="logout-btn" onclick="logout()">退出登录</button>
    </div>
  </div>

  <!-- 内容 -->
  <div class="content">

    <!-- 数据概览 -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="num" id="statOrders">-</div>
        <div class="label">总订单数</div>
      </div>
      <div class="stat-card orange">
        <div class="num" id="statAdvances">-</div>
        <div class="label">垫资总额（元）</div>
      </div>
      <div class="stat-card success">
        <div class="num" id="statGps">-</div>
        <div class="label">GPS在线数</div>
      </div>
      <div class="stat-card danger">
        <div class="num" id="statOverdue">-</div>
        <div class="label">逾期笔数</div>
      </div>
    </div>

    <!-- 标签页 -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('orders')">📋 订单管理</button>
      <button class="tab-btn" onclick="switchTab('advances')">💰 垫资管理</button>
      <button class="tab-btn" onclick="switchTab('gps')">🛰️ GPS设备</button>
      <button class="tab-btn" onclick="switchTab('repayments')">💳 还款管理</button>
      <button class="tab-btn" onclick="switchTab('add')">➕ 添加订单</button>
    </div>

    <!-- 订单列表 -->
    <div class="table-wrap" id="ordersTab">
      <table>
        <thead>
          <tr>
            <th>订单号</th><th>客户</th><th>车辆</th><th>贷款金额</th><th>月供</th><th>阶段</th><th>GPS</th><th>垫资</th><th>操作</th>
          </tr>
        </thead>
        <tbody id="ordersBody"></tbody>
      </table>
    </div>

    <!-- 垫资列表 -->
    <div class="table-wrap" id="advancesTab" style="display:none">
      <table>
        <thead>
          <tr>
            <th>垫资单号</th><th>关联订单</th><th>客户</th><th>金额</th><th>利率</th><th>状态</th>
          </tr>
        </thead>
        <tbody id="advancesBody"></tbody>
      </table>
    </div>

    <!-- GPS列表 -->
    <div class="table-wrap" id="gpsTab" style="display:none">
      <table>
        <thead>
          <tr>
            <th>设备号</th><th>IMEI</th><th>类型</th><th>状态</th><th>最后心跳</th>
          </tr>
        </thead>
        <tbody id="gpsBody"></tbody>
      </table>
    </div>

    <!-- 还款列表 -->
    <div class="table-wrap" id="repaymentsTab" style="display:none">
      <table>
        <thead>
          <tr>
            <th>计划ID</th><th>订单号</th><th>期数</th><th>应还日期</th><th>应还金额</th><th>实还金额</th><th>状态</th>
          </tr>
        </thead>
        <tbody id="repaymentsBody"></tbody>
      </table>
    </div>

    <!-- 添加订单表单 -->
    <div class="form-section" id="addTab" style="display:none">
      <h3>➕ 新建订单</h3>
      <div class="form-row">
        <div class="form-group">
          <label>客户姓名 *</label>
          <input id="fName" placeholder="如：张三">
        </div>
        <div class="form-group">
          <label>手机号 *</label>
          <input id="fPhone" placeholder="13800138000">
        </div>
        <div class="form-group">
          <label>身份证号</label>
          <input id="fIdNum" placeholder="110101199001011234">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>汽车品牌 *</label>
          <input id="fBrand" placeholder="如：宝马">
        </div>
        <div class="form-group">
          <label>车型 *</label>
          <input id="fModel" placeholder="如：320Li">
        </div>
        <div class="form-group">
          <label>车牌号</label>
          <input id="fPlate" placeholder="如：京A12345">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>车价（元）*</label>
          <input id="fPrice" placeholder="如：350000" type="number">
        </div>
        <div class="form-group">
          <label>首付金额（元）*</label>
          <input id="fDown" placeholder="如：70000" type="number">
        </div>
        <div class="form-group">
          <label>贷款金额（元）*</label>
          <input id="fLoan" placeholder="如：280000" type="number">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>分期期数 *</label>
          <select id="fPeriod">
            <option value="12">12期（1年）</option>
            <option value="24">24期（2年）</option>
            <option value="36" selected>36期（3年）</option>
            <option value="48">48期（4年）</option>
            <option value="60">60期（5年）</option>
          </select>
        </div>
        <div class="form-group">
          <label>月供（元）*</label>
          <input id="fMonthly" placeholder="自动计算" type="number" readonly style="background:#f5f5f5">
        </div>
        <div class="form-group">
          <label>合作银行</label>
          <input id="fBank" placeholder="如：工商银行">
        </div>
      </div>
      <button class="submit-btn" onclick="submitOrder()">提 交 订 单</button>
    </div>

  </div>
</div>

<!-- 订单详情弹窗 -->
<div class="modal-overlay" id="orderModal">
  <div class="modal" style="width:600px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 style="margin:0;font-size:16px;color:var(--primary)">📋 订单详情</h3>
      <span class="modal-close" onclick="closeOrderModal()" style="font-size:22px;cursor:pointer;color:var(--text-light)">×</span>
    </div>
    <div id="orderDetailContent" style="font-size:13px;color:var(--text-light)">加载中...</div>
  </div>
</div>

<!-- 提示 -->
<div class="toast" id="toast"></div>

<!-- 底部版权 -->
<div style="text-align:center;padding:20px 0 30px;color:#c4b5fd;font-size:12px;background:linear-gradient(135deg,#f5f3ff,#fdf2f8)">
  <div style="font-size:14px;font-weight:600;color:#7C3AED;margin-bottom:4px">🚗 AI CAR 汽车分期业务管理系统</div>
  <div>© 2026 大秦易购（西安）数字科技有限公司</div>
</div>

<script>
// API地址
const API = 'http://localhost:8899';
const PASSWORD = 'admin123'; // 管理密码

let token = localStorage.getItem('aicar_token');

// 登录
function login() {
  const pw = document.getElementById('passwordInput').value;
  if (pw === PASSWORD) {
    localStorage.setItem('aicar_token', 'logged_in');
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'block';
    loadAll();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

// 退出
function logout() {
  localStorage.removeItem('aicar_token');
  location.reload();
}

// 检查登录
if (token) {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('adminPage').style.display = 'block';
  loadAll();
} else {
  document.getElementById('loginPage').style.display = 'flex';
}

// 切换标签
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('ordersTab').style.display = name === 'orders' ? 'block' : 'none';
  document.getElementById('advancesTab').style.display = name === 'advances' ? 'block' : 'none';
  document.getElementById('gpsTab').style.display = name === 'gps' ? 'block' : 'none';
  document.getElementById('repaymentsTab').style.display = name === 'repayments' ? 'block' : 'none';
  document.getElementById('addTab').style.display = name === 'add' ? 'block' : 'none';
}

// 提示
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = isError ? 'toast error' : 'toast';
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

// API请求
async function api(path, method, body) {
  const headers = { 'Content-Type': 'application/json' };
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  return res.json();
}

// 加载登录token
async function getToken() {
  const res = await api('/api/v1/auth/login', 'POST', { username: 'admin', password: 'admin123' });
  return res.data ? res.data.token : '';
}

// 加载全部数据
async function loadAll() {
  try {
    const token = await getToken();
    const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

    const [ordersRes, advancesRes, gpsRes, repayRes] = await Promise.all([
      fetch(API + '/api/v1/orders', { headers }).then(r => r.json()),
      fetch(API + '/api/v1/advances', { headers }).then(r => r.json()),
      fetch(API + '/api/v1/gps/devices', { headers }).then(r => r.json()),
      fetch(API + '/api/v1/repayments/plans', { headers }).then(r => r.json()),
    ]);

    // 概览
    const orders = ordersRes.data ? ordersRes.data.items || [] : [];
    const advances = advancesRes.data ? (advancesRes.data.items || advancesRes.data || []) : [];
    const gpsDevices = gpsRes.data ? (Array.isArray(gpsRes.data) ? gpsRes.data : (gpsRes.data.items || gpsRes.data.data || [])) : [];
    const repayments = repayRes.data ? (Array.isArray(repayRes.data) ? repayRes.data : (repayRes.data.items || [])) : [];

    document.getElementById('statOrders').textContent = orders.length;
    const totalAdvance = advances.reduce((s, a) => s + (a.advance_amount || 0), 0);
    document.getElementById('statAdvances').textContent = totalAdvance.toLocaleString();
    const onlineGps = gpsDevices.filter(g => g.online_status === '在线').length;
    document.getElementById('statGps').textContent = onlineGps + '/' + gpsDevices.length;
    const overdue = repayments.filter(r => r.status === '逾期').length;
    document.getElementById('statOverdue').textContent = overdue;

    // 订单表格
    const ob = document.getElementById('ordersBody');
    ob.innerHTML = orders.map(o => `
      <tr>
        <td>${o.order_id || '-'}</td>
        <td>${o.customer_name || '-'}</td>
        <td>${o.car_brand || ''} ${o.car_model || ''}</td>
        <td>${o.loan_amount ? o.loan_amount.toLocaleString() + '元' : '-'}</td>
        <td>${o.monthly_payment ? o.monthly_payment.toLocaleString() + '元' : '-'}</td>
        <td><span class="badge ${getStageClass(o.stage)}">${o.stage || '-'}</span></td>
        <td>${(o.stage_remark||'').includes('GPS:') ? o.stage_remark.split('GPS:')[1].split('|')[0] : '-'}</td>
        <td>${(o.stage_remark||'').includes('垫资:') ? o.stage_remark.split('垫资:')[1].split('|')[0] : '-'}</td>
        <td><button class="refresh-btn" onclick="viewOrder('${o.order_id}')">详情</button></td>
      </tr>
    `).join('');

    // 垫资表格
    const ab = document.getElementById('advancesBody');
    ab.innerHTML = advances.map(a => `
      <tr>
        <td>${a.advance_id || '-'}</td>
        <td>${a.order_id || '-'}</td>
        <td>${a.customer_name || '-'}</td>
        <td>${a.advance_amount ? a.advance_amount.toLocaleString() + '元' : '-'}</td>
        <td>${a.interest_rate ? (a.interest_rate * 100).toFixed(2) + '%' : '-'}</td>
        <td><span class="badge ${getAdvanceClass(a.status)}">${a.status || '-'}</span></td>
      </tr>
    `).join('');

    // GPS表格
    const gb = document.getElementById('gpsBody');
    gb.innerHTML = gpsDevices.map(g => `
      <tr>
        <td>${g.device_id || '-'}</td>
        <td>${g.imei || '-'}</td>
        <td>${g.device_type || '-'}</td>
        <td><span class="badge ${g.online_status === '在线' ? 'badge-green' : 'badge-red'}">${g.online_status || '-'}</span></td>
        <td>${g.last_heartbeat ? g.last_heartbeat.slice(0,16) : '-'}</td>
      </tr>
    `).join('');

    // 还款表格
    const rb = document.getElementById('repaymentsBody');
    rb.innerHTML = repayments.slice(0, 50).map(r => `
      <tr>
        <td>${r.plan_id || '-'}</td>
        <td>${r.order_id || '-'}</td>
        <td>第${r.period_number}期</td>
        <td>${r.due_date || '-'}</td>
        <td>${r.due_amount ? r.due_amount.toLocaleString() + '元' : '-'}</td>
        <td>${r.actual_amount ? r.actual_amount.toLocaleString() + '元' : '-'}</td>
        <td><span class="badge ${getRepayClass(r.status)}">${r.status || '-'}</span></td>
      </tr>
    `).join('');

  } catch(e) {
    showToast('加载失败，请检查后端是否启动', true);
  }
}

// 状态颜色
function getStageClass(stage) {
  if (!stage) return 'badge-blue';
  if (stage.includes('结清') || stage.includes('完结')) return 'badge-green';
  if (stage.includes('逾期')) return 'badge-red';
  if (stage.includes('GPS') && stage.includes('在线')) return 'badge-green';
  if (stage.includes('GPS')) return 'badge-yellow';
  return 'badge-blue';
}
function getAdvanceClass(s) {
  if (s === '已还清') return 'badge-green';
  if (s === '已出账') return 'badge-blue';
  if (s === '逾期') return 'badge-red';
  if (s === '待审批') return 'badge-yellow';
  return 'badge-blue';
}
function getRepayClass(s) {
  if (s === '正常') return 'badge-green';
  if (s === '逾期') return 'badge-red';
  if (s === '已还清') return 'badge-blue';
  return 'badge-yellow';
}

// 提交订单
async function submitOrder() {
  const name = document.getElementById('fName').value.trim();
  const phone = document.getElementById('fPhone').value.trim();
  const brand = document.getElementById('fBrand').value.trim();
  const loanAmount = parseFloat(document.getElementById('fLoan').value);
  const downPayment = parseFloat(document.getElementById('fDown').value);
  const loanPeriod = parseInt(document.getElementById('fPeriod').value);

  if (!name || !phone || !brand || !loanAmount || !downPayment) {
    showToast('请填写必填项（*标记）', true); return;
  }

  const monthlyPayment = (loanAmount / loanPeriod).toFixed(2);

  try {
    const token = await getToken();
    // 先创建客户
    const customerRes = await api('/api/v1/customers', 'POST', {
      name, phone,
      id_number: document.getElementById('fIdNum').value,
      address: ''
    }, token);

    const customerId = customerRes.data ? customerRes.data.customer_id : '';

    // 创建订单
    const orderRes = await api('/api/v1/orders', 'POST', {
      customer_id: customerId,
      loan_amount: loanAmount,
      down_payment: downPayment,
      loan_period: loanPeriod,
      monthly_payment: parseFloat(monthlyPayment),
      interest_rate: 0.045,
      bank_name: document.getElementById('fBank').value,
      created_by: 'admin'
    }, token);

    if (orderRes.code === 200) {
      showToast('订单创建成功！');
      // 清空表单
      document.querySelectorAll('#addTab input').forEach(i => i.value = '');
      loadAll();
    } else {
      showToast(orderRes.message || '创建失败', true);
    }
  } catch(e) {
    showToast('提交失败：' + e.message, true);
  }
}

async function api(path, method, body, token) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  return res.json();
}

function viewOrder(id) {
  document.getElementById('orderModal').style.display = 'flex';
  document.getElementById('orderDetailContent').innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-light)">加载中...</div>';
  getToken().then(token => {
    fetch(API + '/api/v1/orders/' + id, {
      headers: { 'Authorization': 'Bearer ' + token }
    }).then(r => r.json()).then(res => {
      const o = res.data;
      if (!o) {
        document.getElementById('orderDetailContent').innerHTML = '<div style="padding:20px;color:var(--danger)">订单不存在</div>';
        return;
      }
      const remark = o.stage_remark || '';
      const reporter = remark.includes('员工:') ? remark.split('员工:')[1].split('|')[0] : (o.created_by || '-');
      const gps = remark.includes('GPS:') ? remark.split('GPS:')[1].split('|')[0] : '-';
      const advance = remark.includes('垫资:') ? remark.split('垫资:')[1].split('|')[0] : '-';
      const feeRate = o.interest_rate ? (o.interest_rate * 100).toFixed(2) + '%' : '-';
      const oneTimeFee = remark.includes('一次性费用:') ? remark.split('一次性费用:')[1].split('|')[0] : '-';
      document.getElementById('orderDetailContent').innerHTML = `
        <div style="margin-bottom:16px;padding:12px;background:#f5f7ff;border-radius:8px">
          <div style="font-size:16px;font-weight:700;color:var(--primary);margin-bottom:4px">${o.customer_name || '-'}</div>
          <div style="font-size:13px;color:var(--text-light)">订单号：${o.order_id || '-'}　状态：<span class="badge ${getStageClass(o.stage)}">${o.stage || '-'}</span></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="detail-item"><div class="detail-label">客户姓名</div><div class="detail-value">${o.customer_name || '-'}</div></div>
          <div class="detail-item"><div class="detail-label">手机号码</div><div class="detail-value">${o.customer_phone || '-'}</div></div>
          <div class="detail-item"><div class="detail-label">身份证号</div><div class="detail-value">${o.id_number || '-'}</div></div>
          <div class="detail-item"><div class="detail-label">客户地址</div><div class="detail-value">${o.address || '-'}</div></div>
          <div class="detail-item"><div class="detail-label">汽车品牌</div><div class="detail-value">${o.car_brand || '-'}</div></div>
          <div class="detail-item"><div class="detail-label">车型</div><div class="detail-value">${o.car_model || '-'}</div></div>
          <div class="detail-item"><div class="detail-label">车牌号</div><div class="detail-value">${o.plate_number || '-'}</div></div>
          <div class="detail-item"><div class="detail-label">车架号VIN</div><div class="detail-value">${o.vin || '-'}</div></div>
          <div class="detail-item"><div class="detail-label">车价</div><div class="detail-value">¥${(o.loan_amount||0)+(o.down_payment||0) > 0 ? (o.loan_amount+o.down_payment).toLocaleString() : '-'}元</div></div>
          <div class="detail-item"><div class="detail-label">首付金额</div><div class="detail-value">¥${o.down_payment ? o.down_payment.toLocaleString()+'元' : '-'}</div></div>
          <div class="detail-item"><div class="detail-label">贷款金额</div><div class="detail-value" style="color:var(--accent);font-weight:700">¥${o.loan_amount ? o.loan_amount.toLocaleString()+'元' : '-'}</div></div>
          <div class="detail-item"><div class="detail-label">分期期数</div><div class="detail-value">${o.loan_period ? o.loan_period+'期' : '-'}</div></div>
          <div class="detail-item"><div class="detail-label">月供</div><div class="detail-value" style="color:var(--accent)">¥${o.monthly_payment ? o.monthly_payment.toLocaleString()+'元' : '-'}</div></div>
          <div class="detail-item"><div class="detail-label">合作银行</div><div class="detail-value">${o.bank_name || '-'}</div></div>
          <div class="detail-item"><div class="detail-label">报单员</div><div class="detail-value">${reporter}</div></div>
          <div class="detail-item"><div class="detail-label">GPS安装</div><div class="detail-value">${gps}</div></div>
          <div class="detail-item"><div class="detail-label">是否垫资</div><div class="detail-value">${advance}</div></div>
          <div class="detail-item"><div class="detail-label">总费率</div><div class="detail-value">${feeRate}</div></div>
          <div class="detail-item"><div class="detail-label">一次性费用</div><div class="detail-value">¥${oneTimeFee}元</div></div>
          <div class="detail-item"><div class="detail-label">月供（60期）</div><div class="detail-value" style="color:var(--accent)">¥${o.monthly_payment ? o.monthly_payment.toLocaleString()+'元' : '-'}</div></div>
          <div class="detail-item"><div class="detail-label">创建时间</div><div class="detail-value">${o.created_at ? o.created_at.slice(0,19) : '-'}</div></div>
        </div>
      `;
    }).catch(() => {
      document.getElementById('orderDetailContent').innerHTML = '<div style="padding:20px;color:var(--danger)">加载失败</div>';
    });
  });
}

function closeOrderModal() {
  document.getElementById('orderModal').style.display = 'none';
}

// 点击遮罩关闭
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('modal-overlay')) closeOrderModal();
});

// 更新时间
function updateTime() {
  const now = new Date();
  document.getElementById('currentTime').textContent =
    now.toLocaleString('zh-CN', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}
setInterval(updateTime, 1000);
updateTime();

// 自动刷新
setInterval(loadAll, 30000);
