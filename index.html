<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI CAR 管理后台</title>
<style>
:root{--p:#0f1f3d;--p2:#1a3a6b;--a:#D4AF37;--bg:#F0F2F5;--c:#fff;--t:#333;--tl:#888;--ok:#52c41a;--err:#ff4d4f}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--t)}
/* LOGIN */
.lp{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--p),var(--p2))}
.lb{background:var(--c);border-radius:16px;padding:40px;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.lb h1{color:var(--a);font-size:22px;margin-bottom:6px}
.lb p{color:var(--tl);font-size:13px;margin-bottom:24px}
.lb input{width:100%;padding:12px;border:1px solid #ddd;border-radius:12px;font-size:15px;outline:none}
.lb input:focus{border-color:var(--a)}
.lb button{width:100%;padding:13px;background:linear-gradient(135deg,var(--a),#B8860B);color:var(--p);border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
.le{color:var(--err);font-size:13px;margin-top:8px;display:none}
/* ADMIN */
.ap{display:none}
/* NAVBAR */
.nb{background:linear-gradient(135deg,var(--p),var(--p2));color:var(--c);padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
.nb h2{font-size:17px}
.lgo{background:rgba(255,255,255,.15);color:var(--c);border:1px solid rgba(255,255,255,.3);padding:5px 14px;border-radius:20px;cursor:pointer;font-size:12px}
/* TABS */
.nt{display:flex;gap:4px;padding:12px 16px 0;background:var(--bg);overflow-x:auto}
.tb{padding:9px 14px;border:none;background:var(--c);border-radius:12px 12px 0 0;cursor:pointer;font-size:13px;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.tb.active{background:linear-gradient(135deg,var(--a),#B8860B);color:var(--p);font-weight:700}
/* CONTENT */
.cn{padding:16px;max-width:1200px;margin:0 auto}
/* CARD */
.cd{background:var(--c);border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:20px;margin-bottom:16px;border-top:3px solid var(--a)}
.cd h3{font-size:14px;color:var(--p);font-weight:700;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #f0}
/* STATS */
.sr{grid-template-columns:repeat(4,1fr);display:grid;gap:12px;margin-bottom:16px}
.si{background:var(--c);border-radius:12px;padding:16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06);border-top:3px solid var(--a)}
.si .v{font-size:22px;font-weight:700}
.si .l{font-size:12px;color:var(--tl);margin-top:4px}
.sc{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.sc .card{background:var(--c);border-radius:10px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:3px solid var(--a)}
.sc .name{font-weight:700;color:var(--p);margin-bottom:8px;font-size:14px}
.sc .ss{display:grid;grid-template-columns:1fr 1fr;gap:8px;text-align:center}
.sc .sv{font-size:20px;font-weight:700;color:var(--a)}
.sc .sl{font-size:11px;color:var(--tl)}
/* TABLE */
.ov{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:linear-gradient(135deg,var(--p),var(--p2));color:var(--c);padding:10px 12px;text-align:left;white-space:nowrap}
tr{border-bottom:1px solid #f0}
tr:hover{background:#f8f9ff}
td{padding:10px 12px}
/* BADGE */
.bdg{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:500}
.bg-grn{background:#e6f7e6;color:var(--ok)}
.bg-yel{background:#fffbe6;color:#faad14}
.bg-red{background:#fff1f0;color:var(--err)}
.bg-blu{background:#e8f0ff;color:var(--p)}
/* BUTTONS */
.bn{padding:3px 10px;border:none;border-radius:4px;cursor:pointer;font-size:12px;background:linear-gradient(135deg,var(--p),var(--p2));color:var(--c)}
.br{background:var(--err)!important}
/* MODAL */
.mo{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.mb{background:var(--c);border-radius:16px;padding:24px;width:600px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.mc{float:right;font-size:24px;cursor:pointer;color:var(--tl);line-height:1}
.mc:hover{color:var(--err)}
.dg{grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;display:grid}
.di{background:#f5f7ff;border-radius:8px;padding:10px 12px}
.di.full{grid-column:1/-1}
.dl{font-size:11px;color:var(--tl);margin-bottom:3px}
.dv{font-size:14px;font-weight:600;color:var(--p)}
/* FORM ADD */
.fs{background:var(--c);border-radius:12px;padding:20px;margin-bottom:16px}
.fg{grid-template-columns:1fr 1fr;display:grid;gap:12px;margin-bottom:12px}
.fp{display:flex;flex-direction:column;gap:5px}
.fp label{font-size:12px;color:var(--tl)}
.fp input,.fp select{padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none}
.fp input:focus{border-color:var(--a)}
.sb{width:100%;padding:14px;background:linear-gradient(135deg,var(--a),#B8860B);color:var(--p);border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin-top:16px}
.sb:disabled{opacity:.6;cursor:not-allowed}
/* TOAST */
.toast{position:fixed;top:70px;right:16px;background:var(--ok);color:var(--c);padding:10px 20px;border-radius:8px;font-size:14px;display:none;z-index:300}
.toast.e{background:var(--err)}
/* EMPTY */
.empty{text-align:center;padding:40px;color:var(--tl);font-size:14px}
</style>
</head>
<body>

<div class="lp" id="loginPage">
  <div class="lb">
    <h1>AI CAR 管理后台</h1>
    <p>大秦易购 · 汽车分期业务管理系统</p>
    <input type="password" id="pwInput" placeholder="管理员密码" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">登 录</button>
    <div class="le" id="loginError">密码错误，请重试</div>
  </div>
</div>

<div class="ap" id="adminPage">
  <div class="nb">
    <h2>AI CAR 管理后台</h2>
    <button class="lgo" onclick="doLogout()">退出登录</button>
  </div>
  <div class="nt" id="tabBar">
    <button class="tb active" onclick="switchTab('stats')">统计报表</button>
    <button class="tb" onclick="switchTab('orders')">订单列表</button>
    <button class="tb" onclick="switchTab('advances')">垫资管理</button>
    <button class="tb" onclick="switchTab('gps')">GPS设备</button>
    <button class="tb" onclick="switchTab('repayments')">还款管理</button>
    <button class="tb" onclick="switchTab('mortgage')">抵押管理</button>
    <button class="tb" onclick="switchTab('add')">添加订单</button>
  </div>
  <div class="cn">

    <div id="statsDiv"></div>
    <div id="ordersDiv" style="display:none"></div>
    <div id="advancesDiv" style="display:none"></div>
    <div id="gpsDiv" style="display:none"></div>
    <div id="repaymentsDiv" style="display:none"></div>
    <div id="mortgageDiv" style="display:none"></div>
    <div id="addDiv" style="display:none"></div>

  </div>
</div>

<!-- ORDER DETAIL MODAL -->
<div class="mo" id="orderModal">
  <div class="mb">
    <span class="mc" onclick="closeModal()">x</span>
    <div id="modalContent"></div>
  </div>
</div>

<!-- PHOTO LARGE -->
<div class="mo" id="photoModal" onclick="this.style.display='none'">
  <img id="photoLarge" style="max-width:90%;max-height:90%;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.5)">
</div>

<div class="toast" id="toast"></div>

<script>
var API = 'http://192.168.1.16:8899';
var currentTab = 'stats';

// ==================== LOGIN ====================
function doLogin() {
  var pw = document.getElementById('pwInput').value;
  if (pw === 'admin123') {
    localStorage.setItem('admin_token', '1');
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'block';
    switchTab('stats');
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function doLogout() {
  localStorage.removeItem('admin_token');
  location.reload();
}

if (localStorage.getItem('admin_token')) {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('adminPage').style.display = 'block';
  switchTab('stats');
}

// ==================== TOAST ====================
function toast(msg, isErr) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isErr ? ' e' : '');
  t.style.display = 'block';
  setTimeout(function() { t.style.display = 'none'; }, 3500);
}

// ==================== TOKEN ====================
function getToken() {
  return fetch(API + '/api/v1/auth/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username: 'admin', password: 'admin123'})
  }).then(function(r) { return r.json(); }).then(function(d) { return d.data ? d.data.token : ''; });
}

// ==================== TAB SWITCH ====================
function switchTab(name) {
  var tabs = ['stats', 'orders', 'advances', 'gps', 'repayments', 'mortgage', 'add'];
  var i;
  for (i = 0; i < tabs.length; i++) {
    var el = document.getElementById(tabs[i] + 'Div');
    if (el) el.style.display = 'none';
  }
  document.querySelectorAll('.tb').forEach(function(b) { b.classList.remove('active'); });
  var target = document.getElementById(name + 'Div');
  if (target) target.style.display = 'block';
  var btns = document.querySelectorAll('.tb');
  if (btns[tabs.indexOf(name)]) btns[tabs.indexOf(name)].classList.add('active');
  currentTab = name;
  if (name === 'stats') loadStats();
  else if (name === 'orders') loadOrders();
  else if (name === 'advances') loadAdvances();
  else if (name === 'gps') loadGps();
  else if (name === 'repayments') loadRepayments();
  else if (name === 'mortgage') loadMortgages();
  else if (name === 'add') renderAddForm();
}

// ==================== HELPERS ====================
function fmt(n) { return n ? Number(n).toLocaleString() : '0'; }
function sc(s) {
  if (!s) return 'bg-blu';
  if (s.indexOf('结清') >= 0 || s.indexOf('已抵押') >= 0 || s.indexOf('完成') >= 0) return 'bg-grn';
  if (s.indexOf('逾期') >= 0) return 'bg-red';
  if (s.indexOf('垫资') >= 0) return 'bg-yel';
  return 'bg-blu';
}
function getRem(rem) {
  rem = rem || '';
  return {
    staff: rem.indexOf('员工:') >= 0 ? rem.split('员工:')[1].split('|')[0] : '-',
    gps: rem.indexOf('GPS:') >= 0 ? rem.split('GPS:')[1].split('|')[0] : '-',
    adv: rem.indexOf('垫资:') >= 0 ? rem.split('垫资:')[1].split('|')[0] : '-',
    bank: rem.indexOf('抵押银行:') >= 0 ? rem.split('抵押银行:')[1].split('|')[0] : '-',
    date: rem.indexOf('抵押日期:') >= 0 ? rem.split('抵押日期:')[1].split('|')[0] : '-',
    cert: rem.indexOf('抵押证号:') >= 0 ? rem.split('抵押证号:')[1].split('|')[0] : '-',
    interest: rem.indexOf('总利息:') >= 0 ? rem.split('总利息:')[1].split('|')[0] : '-'
  };
}

// ==================== LOAD STATS ====================
function loadStats() {
  var div = document.getElementById('statsDiv');
  div.innerHTML = '<div class="cd"><h3>业务总览</h3><div class="empty">加载中...</div></div>';
  getToken().then(function(token) {
    var h = {'Authorization': 'Bearer ' + token};
    return fetch(API + '/api/v1/orders', {headers: h});
  }).then(function(r) { return r.json(); }).then(function(d) {
    var orders = (d.data && d.data.items) ? d.data.items : [];
    var now = new Date();
    var ms = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0, 10);
    var tm = orders.filter(function(o) { return (o.created_at || '').slice(0, 10) >= ms; });
    var tl = 0, ti = 0, tm2 = 0;
    var i;
    for (i = 0; i < tm.length; i++) {
      var o = tm[i];
      tl += o.loan_amount || 0;
      var r = o.interest_rate || 0;
      ti += r >= 1 ? r * (o.loan_amount || 0) / 100 : r * (o.loan_amount || 0);
      tm2 += o.monthly_payment || 0;
    }
    var statsHtml =
      '<div class="sr">' +
        '<div class="si"><div class="v" style="color:var(--a)">' + tm.length + '</div><div class="l">本月订单</div></div>' +
        '<div class="si"><div class="v" style="color:var(--a)">' + (tl > 0 ? (tl / 10000).toFixed(1) + '万' : '0') + '</div><div class="l">本月放款</div></div>' +
        '<div class="si"><div class="v" style="color:var(--a)">' + (ti > 0 ? (ti / 10000).toFixed(1) + '万' : '0') + '</div><div class="l">本月利息</div></div>' +
        '<div class="si"><div class="v" style="color:var(--a)">' + (tm2 > 0 ? (tm2 / 10000).toFixed(1) + '万' : '0') + '</div><div class="l">月供合计/月</div></div>' +
      '</div>';
    // staff
    var sm = {};
    sm['焦建华'] = {n: '焦建华', c: 'DQ003', ct: 0, loan: 0};
    sm['邹文丽'] = {n: '邹文丽', c: 'DQ005', ct: 0, loan: 0};
    for (i = 0; i < tm.length; i++) {
      var rem = tm[i].stage_remark || '';
      var rep = rem.indexOf('员工:') >= 0 ? rem.split('员工:')[1].split('|')[0] : '';
      if (sm[rep]) { sm[rep].ct++; sm[rep].loan += tm[i].loan_amount || 0; }
    }
    var staffKeys = Object.keys(sm);
    var scHtml = '<h3 style="margin-top:20px">员工业务（本月）</h3><div class="sc">';
    for (i = 0; i < staffKeys.length; i++) {
      var st = sm[staffKeys[i]];
      scHtml += '<div class="card"><div class="name">' + st.n + ' <span style="font-size:11px;color:#888">(' + st.c + ')</span></div><div class="ss">' +
        '<div><div class="sv">' + st.ct + '</div><div class="sl">订单数</div></div>' +
        '<div><div class="sv" style="color:var(--p)">' + (st.loan > 0 ? (st.loan / 10000).toFixed(1) + '万' : '0') + '</div><div class="sl">放款额</div></div>' +
      '</div></div>';
    }
    scHtml += '</div>';
    // fee dist
    var fm = {};
    for (i = 0; i < tm.length; i++) {
      var o = tm[i];
      var r = o.interest_rate || 0;
      var rf = (r >= 1 ? r : r * 100).toFixed(2) + '%';
      if (!fm[rf]) fm[rf] = {r: rf, ct: 0, loan: 0};
      fm[rf].ct++;
      fm[rf].loan += o.loan_amount || 0;
    }
    var feeKeys = Object.keys(fm);
    var feeHtml = '<h3 style="margin-top:20px">费率分布（本月）</h3><div class="sr">';
    for (i = 0; i < feeKeys.length; i++) {
      var f = fm[feeKeys[i]];
      feeHtml += '<div class="si"><div class="v" style="color:var(--a)">' + f.r + '</div><div class="l">' + f.ct + '单 / ' + (f.loan / 10000).toFixed(1) + '万</div></div>';
    }
    feeHtml += '</div>';
    div.innerHTML = '<div class="cd"><h3>本月业务总览</h3>' + statsHtml + scHtml + feeHtml + '</div>';
  }).catch(function() {
    div.innerHTML = '<div class="cd"><h3>业务总览</h3><div class="empty">加载失败，请检查后端服务</div></div>';
  });
}

// ==================== LOAD ORDERS ====================
function loadOrders() {
  var div = document.getElementById('ordersDiv');
  div.innerHTML = '<div class="cd"><h3>全部订单</h3><div class="empty">加载中...</div></div>';
  getToken().then(function(token) {
    var h = {'Authorization': 'Bearer ' + token};
    return fetch(API + '/api/v1/orders', {headers: h});
  }).then(function(r) { return r.json(); }).then(function(d) {
    var orders = (d.data && d.data.items) ? d.data.items : [];
    if (!orders.length) {
      div.innerHTML = '<div class="cd"><h3>全部订单</h3><div class="empty">暂无订单</div></div>';
      return;
    }
    var rows = '';
    var i;
    for (i = 0; i < orders.length; i++) {
      var o = orders[i];
      var r = getRem(o.stage_remark || '');
      var stage = o.stage || '-';
      rows += '<tr>' +
        '<td style="font-size:12px;color:#888">' + (o.order_id || '-') + '</td>' +
        '<td style="font-weight:600">' + (o.customer_name || '-') + '</td>' +
        '<td>' + (o.car_brand || '') + ' ' + (o.car_model || '') + '</td>' +
        '<td style="color:var(--a);font-weight:700">¥' + fmt(o.loan_amount) + '</td>' +
        '<td>¥' + fmt(o.monthly_payment) + '</td>' +
        '<td><span class="bdg ' + sc(stage) + '">' + stage + '</span></td>' +
        '<td>' + r.gps + '</td><td>' + r.adv + '</td>' +
        '<td style="font-size:12px">' + r.staff + '</td>' +
        '<td><button class="bn" onclick="viewOrder(\'' + (o.order_id || '') + '\')">详情</button> ' +
        '<button class="bn br" onclick="delOrder(\'' + (o.order_id || '') + '\')">删除</button></td>' +
      '</tr>';
    }
    div.innerHTML = '<div class="cd"><h3>全部订单（' + orders.length + '条）</h3><div class="ov"><table><thead><tr><th>订单号</th><th>客户</th><th>车辆</th><th>贷款金额</th><th>月供</th><th>阶段</th><th>GPS</th><th>垫资</th><th>报单员</th><th>操作</th></tr></thead><tbody>' + rows + '</tbody></table></div></div>';
  }).catch(function() {
    div.innerHTML = '<div class="cd"><h3>全部订单</h3><div class="empty">加载失败</div></div>';
  });
}

// ==================== LOAD ADVANCES ====================
function loadAdvances() {
  var div = document.getElementById('advancesDiv');
  div.innerHTML = '<div class="cd"><h3>垫资单列表</h3><div class="empty">加载中...</div></div>';
  getToken().then(function(token) {
    var h = {'Authorization': 'Bearer ' + token};
    return fetch(API + '/api/v1/advances', {headers: h});
  }).then(function(r) { return r.json(); }).then(function(d) {
    var items = (d.data && d.data.items) ? d.data.items : (d.data ? (Array.isArray(d.data) ? d.data : []) : []);
    if (!items.length) {
      div.innerHTML = '<div class="cd"><h3>垫资单列表</h3><div class="empty">暂无垫资记录</div></div>';
      return;
    }
    var rows = '';
    var i;
    for (i = 0; i < items.length; i++) {
      var a = items[i];
      var r2 = a.interest_rate || 0;
      var rate = (r2 >= 1 ? r2 : r2 * 100).toFixed(2) + '%';
      rows += '<tr>' +
        '<td>' + (a.advance_id || '-') + '</td>' +
        '<td>' + (a.order_id || '-') + '</td>' +
        '<td style="color:var(--a);font-weight:700">¥' + fmt(a.advance_amount) + '</td>' +
        '<td>' + rate + '</td>' +
        '<td><span class="bdg ' + sc(a.status) + '">' + (a.status || '-') + '</span></td>' +
        '<td><button class="bn br" onclick="delAdvance(\'' + (a.advance_id || '') + '\')">删除</button></td>' +
      '</tr>';
    }
    div.innerHTML = '<div class="cd"><h3>垫资单列表（' + items.length + '条）</h3><div class="ov"><table><thead><tr><th>垫资号</th><th>订单号</th><th>金额</th><th>利率</th><th>状态</th><th>操作</th></tr></thead><tbody>' + rows + '</tbody></table></div></div>';
  }).catch(function() {
    div.innerHTML = '<div class="cd"><h3>垫资单列表</h3><div class="empty">加载失败</div></div>';
  });
}

// ==================== LOAD GPS ====================
function loadGps() {
  var div = document.getElementById('gpsDiv');
  div.innerHTML = '<div class="cd"><h3>GPS设备列表</h3><div class="empty">加载中...</div></div>';
  getToken().then(function(token) {
    var h = {'Authorization': 'Bearer ' + token};
    return fetch(API + '/api/v1/gps/devices', {headers: h});
  }).then(function(r) { return r.json(); }).then(function(d) {
    var items = (d.data && d.data.items) ? d.data.items : (d.data ? (Array.isArray(d.data) ? d.data : []) : []);
    if (!items.length) {
      div.innerHTML = '<div class="cd"><h3>GPS设备列表</h3><div class="empty">暂无GPS设备</div></div>';
      return;
    }
    var rows = '';
    var i;
    for (i = 0; i < items.length; i++) {
      var g = items[i];
      var online = g.online_status === '在线';
      rows += '<tr>' +
        '<td>' + (g.device_id || '-') + '</td>' +
        '<td style="font-size:12px">' + (g.imei || '-') + '</td>' +
        '<td>' + (g.device_type || '-') + '</td>' +
        '<td><span class="bdg ' + (online ? 'bg-grn' : 'bg-red') + '">' + (g.online_status || '-') + '</span></td>' +
        '<td>' + ((g.last_heartbeat || '').slice(0, 16)) + '</td>' +
      '</tr>';
    }

// ==================== DELETE ====================
function delOrder(oid) {
  if (!confirm('确认删除订单 ' + oid + '？删除后无法恢复。')) return;
  getToken().then(function(token) {
    var h = {'Authorization': 'Bearer ' + token};
    return fetch(API + '/api/v1/orders/' + oid, {method: 'DELETE', headers: h});
  }).then(function(r) { return r.json(); }).then(function() {
    toast('订单已删除');
    if (currentTab === 'orders') loadOrders();
    else if (currentTab === 'stats') loadStats();
  }).catch(function() { toast('删除失败', true); });
}

async function submitNewOrder() {
  var name = document.getElementById('aName').value.trim();
  var phone = document.getElementById('aPhone').value.trim();
  var brand = document.getElementById('aBrand').value.trim();
  var model = document.getElementById('aModel').value.trim();
  var price = parseFloat(document.getElementById('aPrice').value) || 0;
  var loan = parseFloat(document.getElementById('aLoan').value) || 0;
  if (!name || !phone || !brand || !model || !price || !loan) { toast('请填写必填项', true); return; }
  if (phone.length !== 11) { toast('手机号需11位', true); return; }
  var btn = document.getElementById('aSubmitBtn');
  btn.disabled = true; btn.textContent = '提交中...';
  try {
    var token = await getToken();
    var h = {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token};
    var cid = '';
    var cr = await fetch(API + '/api/v1/customers?phone=' + phone, {headers: h}).then(function(r) { return r.json(); });
    if (cr.data && cr.data.items && cr.data.items.length > 0) {
      cid = cr.data.items[0].customer_id;
    }
    if (!cid) {
      var cr2 = await fetch(API + '/api/v1/customers', {method: 'POST', headers: h, body: JSON.stringify({
        name: name, phone: phone, id_number: document.getElementById('aIdNum').value, address: document.getElementById('aAddr').value
      })}).then(function(r) { return r.json(); });
      if (cr2.data && cr2.data.customer) cid = cr2.data.customer.customer_id;
    }
    var reporter = document.getElementById('aReporter').value;
    var feeRate = loan > 0 && price > 0 ? (price - loan) / price * 0.135 : 0.135;
    var res = await fetch(API + '/api/v1/orders', {method: 'POST', headers: h, body: JSON.stringify({
      customer_id: cid, customer_name: name, customer_phone: phone,
      car_brand: brand, car_model: model, car_price: price,
      plate_number: document.getElementById('aPlate').value.trim(),
      loan_amount: loan,
      down_payment: parseFloat(document.getElementById('aDown').value) || 0,
      loan_period: 60,
      monthly_payment: parseFloat(document.getElementById('aMonthly').value) || 0,
      interest_rate: feeRate,
      bank_name: document.getElementById('aBank').value,
      created_by: reporter || '管理员',
      stage: '已提交',
      stage_remark: '员工:' + (reporter || '管理员')
    })}).then(function(r) { return r.json(); });
    if (res.code === 200 || res.code === 201) {
      toast('订单提交成功！');
      switchTab('orders');
    } else {
      toast(res.message || '提交失败', true);
    }
  } catch(e) { toast('提交失败', true); }
  btn.disabled = false; btn.textContent = '提 交 订 单';
}
</script>
