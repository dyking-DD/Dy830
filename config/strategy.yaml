# 量化交易策略配置
# Strategy Configuration

# ============================================
# SEPA策略配置 (Minervini SEPA)
# ============================================
sepa:
  name: "Minervini SEPA"
  description: "Mark Minervini SEPA趋势跟踪策略"
  enabled: true
  
  # 财务指标阈值
  financial:
    min_revenue_growth: 0.25        # 最低营收同比增长 25%
    min_profit_growth_yoy: 0.30     # 最低净利润同比增长 30%
    min_profit_growth_qoq: 0.0      # 最低净利润环比增长 0% (必须为正)
    min_roe: 0.15                   # 最低ROE 15%
    min_cagr_3y: 0.20               # 最低3年净利润CAGR 20%
  
  # 技术指标阈值
  technical:
    price_above_ma50: true          # 股价 > 50日均线
    price_above_ma150: true         # 股价 > 150日均线
    volume_above_ma120: true        # 成交量 > 120日均量
    rs_rating_min: 80               # 相对强度评分最低80
  
  # 过滤条件
  filters:
    exclude_st: true                # 排除ST股票
    exclude_new_listing: true       # 排除次新股（上市<365天）
    max_listing_days: 365           # 最大上市天数
    min_market_cap: 5_0000_0000     # 最小市值 5亿

# ============================================
# 动量策略配置
# ============================================
momentum:
  name: "Momentum Strategy"
  description: "基于价格动量的选股策略"
  enabled: false
  
  lookback_periods: [20, 60, 120]  # 回顾周期（交易日）
  min_momentum_score: 70           # 最低动量评分
  
  weights:
    price_momentum_20d: 0.4        # 20日价格动量权重
    price_momentum_60d: 0.35       # 60日价格动量权重
    volume_momentum: 0.25          # 成交量动量权重

# ============================================
# 均值回归策略配置
# ============================================
mean_reversion:
  name: "Mean Reversion"
  description: "基于RSI超卖信号的均值回归策略"
  enabled: false
  
  rsi_period: 14
  rsi_oversold: 30                 # RSI超卖阈值
  rsi_overbought: 70               # RSI超买阈值
  
  bollinger:
    period: 20
    std_dev: 2.0

# ============================================
# 全局扫描配置
# ============================================
scanner:
  # 扫描范围
  watchlist_file: "config/watchlist.txt"
  max_stocks: 100                  # 最大扫描股票数
  
  # 扫描时间
  scan_time: "16:00"               # 每日扫描时间（收盘后）
  trading_days_only: true          # 仅工作日扫描
  
  # 结果限制
  top_n: 10                        # 只显示前N个结果
  min_score: 60                    # 最低综合评分

# ============================================
# 回测配置
# ============================================
backtest:
  start_date: "2023-01-01"
  end_date: "2025-12-31"
  initial_capital: 100000          # 初始资金
  commission_rate: 0.0003          # 佣金率（万3）
  slippage: 0.001                  # 滑点（千1）
  
  # 仓位管理
  position_sizing:
    method: "equal_weight"         # 等权重
    max_positions: 5               # 最大持仓数
    max_position_pct: 0.2          # 单票最大仓位 20%
