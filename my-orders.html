<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的报单 - 汽车分期系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background: #f3f4f6;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1f2937;
        }

        .new-order-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
        }

        .order-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .order-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e5e7eb;
        }

        .order-id {
            font-size: 14px;
            font-weight: 600;
            color: #1f2937;
        }

        .order-status {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status-approved {
            background: #d1fae5;
            color: #065f46;
        }

        .status-rejected {
            background: #fee2e2;
            color: #991b1b;
        }

        .order-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 14px;
        }

        .info-item {
            color: #6b7280;
        }

        .info-value {
            color: #1f2937;
            font-weight: 500;
        }

        .order-amount {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .amount {
            font-size: 20px;
            font-weight: 700;
            color: #667eea;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }

        @media (max-width: 480px) {
            .stats {
                grid-template-columns: 1fr;
            }

            .order-info {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>我的报单</h1>
            <a href="loan-form.html" class="new-order-btn">+ 新报单</a>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalOrders">0</div>
                <div class="stat-label">总报单</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pendingOrders">0</div>
                <div class="stat-label">待审批</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="approvedOrders">0</div>
                <div class="stat-label">已通过</div>
            </div>
        </div>

        <div class="order-list" id="orderList">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        // 获取业务员的报单列表
        async function loadOrders() {
            try {
                // 从localStorage获取业务员信息
                const salespersonName = localStorage.getItem('salespersonName') || '业务员';

                // 从API获取报单列表
                const response = await fetch(`/api/my-orders?salesperson=${encodeURIComponent(salespersonName)}`);
                const result = await response.json();

                if (result.success) {
                    displayOrders(result.orders);
                    updateStats(result.orders);
                } else {
                    showError('加载失败，请刷新重试');
                }
            } catch (error) {
                console.error('加载报单错误:', error);
                showError('网络错误，请检查连接');
            }
        }

        // 显示报单列表
        function displayOrders(orders) {
            const orderList = document.getElementById('orderList');

            if (!orders || orders.length === 0) {
                orderList.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                        <p>暂无报单</p>
                        <a href="loan-form.html" style="color: #667eea; margin-top: 10px; display: inline-block;">创建第一个报单</a>
                    </div>
                `;
                return;
            }

            orderList.innerHTML = orders.map(order => `
                <div class="order-card">
                    <div class="order-header">
                        <span class="order-id">${order.orderId}</span>
                        <span class="order-status status-${order.status}">
                            ${getStatusText(order.status)}
                        </span>
                    </div>
                    <div class="order-info">
                        <div class="info-item">客户姓名</div>
                        <div class="info-value">${order.name}</div>
                        <div class="info-item">联系电话</div>
                        <div class="info-value">${order.phone}</div>
                        <div class="info-item">车型</div>
                        <div class="info-value">${order.carModel}</div>
                        <div class="info-item">提交时间</div>
                        <div class="info-value">${formatDate(order.submitTime)}</div>
                    </div>
                    <div class="order-amount">
                        <div>
                            <div class="info-item">贷款金额</div>
                            <div class="amount">${order.loanAmount}万元</div>
                        </div>
                        <div>
                            <div class="info-item">贷款期数</div>
                            <div class="info-value">${order.loanTerm}期</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 更新统计数据
        function updateStats(orders) {
            const total = orders.length;
            const pending = orders.filter(o => o.status === 'pending').length;
            const approved = orders.filter(o => o.status === 'approved').length;

            document.getElementById('totalOrders').textContent = total;
            document.getElementById('pendingOrders').textContent = pending;
            document.getElementById('approvedOrders').textContent = approved;
        }

        // 获取状态文本
        function getStatusText(status) {
            const statusMap = {
                'pending': '待审批',
                'approved': '已通过',
                'rejected': '已拒绝'
            };
            return statusMap[status] || status;
        }

        // 格式化日期
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function showError(message) {
            const orderList = document.getElementById('orderList');
            orderList.innerHTML = `
                <div style="text-align: center; padding: 40px; color: #ef4444;">
                    ${message}
                </div>
            `;
        }

        // 页面加载时获取报单列表
        loadOrders();

        // 每30秒自动刷新
        setInterval(loadOrders, 30000);
    </script>
</body>
</html>
